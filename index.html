<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Iron Hand — Gesture Vision Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;font-family:'JetBrains Mono',monospace;user-select:none;touch-action:none;overscroll-behavior:none}

video{position:absolute;top:0;left:0;width:100vw;height:100dvh;object-fit:cover;z-index:0;opacity:0;transition:opacity .3s;transform:scaleX(-1)}
video.cam-on{opacity:1}
#three-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:1;transition:opacity .3s}
#three-canvas.cam-through{opacity:0.35}
#game-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:2;display:none}
#hud-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:3;pointer-events:none}

/* ── HUD badges ── */
#hud{position:absolute;top:max(14px,env(safe-area-inset-top,14px));left:max(14px,env(safe-area-inset-left,14px));z-index:10;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.hud-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:5px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap}
.b-status{background:rgba(0,255,120,0.12);color:#00ff78;border:1px solid rgba(0,255,120,0.25)}
.b-status.loading{color:#ffaa00;background:rgba(255,170,0,0.12);border-color:rgba(255,170,0,0.25)}
.b-status.error{color:#ff4466;background:rgba(255,68,102,0.12);border-color:rgba(255,68,102,0.25)}
.b-info{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1)}
.b-hands{background:rgba(0,200,255,0.1);color:#00c8ff;border:1px solid rgba(0,200,255,0.2)}
.b-gesture{background:rgba(190,120,255,0.12);color:#be78ff;border:1px solid rgba(190,120,255,0.3);font-weight:700}

/* ── Gesture Toast ── */
#gestureToast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;text-align:center;opacity:0;transition:opacity .2s}
#gestureToast.visible{opacity:1}
#gestureEmoji{font-size:52px;filter:drop-shadow(0 0 25px rgba(0,200,255,0.6));animation:gP .4s ease-out}
#gestureName{font-size:20px;letter-spacing:5px;text-transform:uppercase;font-weight:900;font-family:'Orbitron',sans-serif;color:#00e5ff;text-shadow:0 0 30px rgba(0,229,255,0.7),0 0 60px rgba(0,229,255,0.3);animation:gS .3s ease-out}
#gestureConf{font-size:9px;letter-spacing:3px;color:rgba(0,229,255,0.5);margin-top:4px;font-family:'Orbitron',sans-serif}
@keyframes gP{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes gS{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}

/* ── Top controls ── */
#top-controls{position:absolute;top:max(14px,env(safe-area-inset-top,14px));right:max(14px,env(safe-area-inset-right,14px));z-index:20;display:flex;gap:5px}

/* ── Game UI ── */
#game-ui{position:absolute;top:max(55px,env(safe-area-inset-top,55px));right:max(24px,env(safe-area-inset-right,24px));z-index:10;display:none;font-size:20px;color:#00e5ff;font-weight:bold;font-family:'Orbitron',sans-serif;text-shadow:0 0 15px rgba(0,229,255,0.5);pointer-events:none}

/* ── Bottom UI ── */
#ui{position:absolute;bottom:max(10px,env(safe-area-inset-bottom,10px));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:5px;z-index:10;align-items:center;width:100%;max-width:920px;padding:0 8px;transition:opacity .3s,transform .3s}
.panel{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:4px;background:rgba(5,5,15,0.85);padding:5px 8px;border-radius:8px;border:1px solid rgba(0,229,255,0.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);width:100%}
.btn{padding:6px 10px;border-radius:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:inherit;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:rgba(0,229,255,0.08);color:#fff}
.btn.active{background:rgba(0,229,255,0.15);color:#00e5ff;border-color:rgba(0,229,255,0.4)}
.btn-alien{color:#ff4444;border-color:rgba(255,68,68,0.2)}.btn-alien.active{background:rgba(255,68,68,0.15);color:#ff4444;border-color:rgba(255,68,68,0.5)}
.btn-game{color:#50fa7b;border-color:rgba(80,250,123,0.2)}.btn-game.active{background:rgba(80,250,123,0.15);color:#50fa7b;border-color:rgba(80,250,123,0.5)}
.divider{width:1px;background:rgba(0,229,255,0.2);margin:0 2px;height:16px}
.cam-select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(0,229,255,0.3);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:9px;max-width:120px;outline:none;cursor:pointer}
.cam-select option{background:#111;color:#fff}
.ctrl-group{display:flex;align-items:center;gap:4px;font-size:8px;color:rgba(0,229,255,0.6);text-transform:uppercase}
.ctrl-group input[type=range]{width:50px;height:3px;accent-color:#00e5ff;cursor:pointer}
@media(max-width:600px){.btn{padding:4px 6px;font-size:7px}.panel{padding:4px 6px;gap:2px}.cam-select{max-width:90px;font-size:7px}#gestureEmoji{font-size:36px}#gestureName{font-size:14px;letter-spacing:3px}}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>
<canvas id="game-canvas"></canvas>
<canvas id="hud-canvas"></canvas>

<div id="gestureToast"><div id="gestureEmoji"></div><div id="gestureName"></div><div id="gestureConf"></div></div>

<div id="hud">
    <div class="hud-row"><div class="badge b-status loading" id="status">Init…</div><div class="badge b-info" id="fpsDisplay">-- fps</div></div>
    <div class="hud-row"><div class="badge b-hands" id="handStatus">Hands: 0</div><div class="badge b-gesture" id="gestureHud">—</div></div>
</div>

<div id="top-controls">
    <button class="btn" id="btn-ui-toggle" onclick="toggleUI()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">☰</button>
    <button class="btn" id="btn-cam-view" onclick="toggleCamView()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">📷</button>
    <button class="btn" onclick="toggleFS()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">⛶</button>
</div>
<div id="game-ui">SCORE: <span id="score">0</span></div>

<div id="ui">
    <div class="panel" id="flow-opts" style="display:none;background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.25)">
        <div class="ctrl-group"><span>Rot</span><input type="range" id="s-rot" min="0" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Spd</span><input type="range" id="s-int" min="0" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Rad</span><input type="range" id="s-rad" min="0.2" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Frc</span><input type="range" id="s-frc" min="0" max="3" step="0.1" value="1"></div>
    </div>
    <div class="panel">
        <button class="btn mode-btn active" id="btn-pond" onclick="setMode('pond','world')">Pond</button>
        <button class="btn mode-btn" id="btn-flow" onclick="setMode('flow','world')">Flow</button>
        <button class="btn mode-btn" id="btn-flow2" onclick="setMode('flow2','world')">Flow v2</button>
        <button class="btn mode-btn" id="btn-earth" onclick="setMode('earth','world')">Earth</button>
        <button class="btn mode-btn" id="btn-nebula" onclick="setMode('nebula','world')">Nebula</button>
        <button class="btn mode-btn" id="btn-storm" onclick="setMode('storm','world')">Storm</button>
        <button class="btn mode-btn" id="btn-shatter" onclick="setMode('shatter','world')">Shatter</button>
        <button class="btn mode-btn btn-alien" id="btn-alien" onclick="setMode('alien','world')">Alien</button>
    </div>
    <div class="panel">
        <button class="btn mode-btn btn-game" id="btn-bubbles" onclick="setMode('bubbles','game')">🫧 Bubbles</button>
        <button class="btn mode-btn btn-game" id="btn-fruits" onclick="setMode('fruits','game')">🍉 Fruits</button>
        <div class="divider"></div>
        <button class="btn res active" onclick="setRes('low')" id="res-low">Low</button>
        <button class="btn res" onclick="setRes('med')" id="res-med">Med</button>
        <button class="btn res" onclick="setRes('high')" id="res-high">High</button>
    </div>
    <div class="panel" style="background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.3)">
        <select id="cam-select" class="cam-select"></select>
        <button class="btn" onclick="toggleCamRotation()" style="background:transparent;border:none;padding:1px;margin:0 2px">
            <svg id="phone-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .3s"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><circle cx="12" cy="18" r="1"/></svg>
        </button>
        <span id="cam-deg" style="font-size:11px;color:#00e5ff;font-weight:900;width:22px;text-align:right;margin-right:2px;font-family:Orbitron">0°</span>
        <div class="divider" style="height:20px;background:rgba(0,229,255,0.2)"></div>
        <button class="btn active" id="btn-mirror" onclick="toggleMirror()">🪞 Flip</button>
        <button class="btn active" id="btn-holo" onclick="toggleHolo()">✨ Holo</button>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  REFS & STATE
// ═══════════════════════════════════════════════════
const videoElement=document.getElementById('cam'),threeCanvas=document.getElementById('three-canvas'),gameCanvas=document.getElementById('game-canvas'),hudCanvas=document.getElementById('hud-canvas');
const gCtx=gameCanvas.getContext('2d'),hCtx=hudCanvas.getContext('2d');
const statusEl=document.getElementById('status'),fpsEl=document.getElementById('fpsDisplay'),gestureHudEl=document.getElementById('gestureHud'),handStatusEl=document.getElementById('handStatus'),scoreEl=document.getElementById('score'),camSelect=document.getElementById('cam-select');

let W=window.innerWidth,H=window.innerHeight;
gameCanvas.width=hudCanvas.width=W;gameCanvas.height=hudCanvas.height=H;

let lastFrameTime=performance.now(),frameCount=0,time=0;
let currentMode='pond',currentCategory='world',currentRes='low';
let resMult=0.3,gameScore=0,camRotation=0,mirrorX=true,uiVisible=true,camView=false,holoEnabled=true;

// Gesture state
let gesture={count:0,fist:false,h1:null,h2:null,hands:[]};
let s_scale=1,s_rotZ=0,s_rotX=0,s_rotY=0,s_fist=0;
let dragOffsetX=0,dragOffsetY=0,isDragging=false;

// Per-hand smoothed positions + trails
const handSmooth=[
    {x:0,y:0,tips:[],palmX:0,palmY:0,state:'none',prevState:'none',stateTime:0,scanT:0,trails:[[],[],[],[],[]]},
    {x:0,y:0,tips:[],palmX:0,palmY:0,state:'none',prevState:'none',stateTime:0,scanT:0,trails:[[],[],[],[],[]]},
];
const TRAIL_LEN=12;

// Radial wheel
let wheelActive=false,wheelHand=-1,wheelAngle=0,wheelSelected=-1,wheelOpacity=0;
const MODE_LIST=[
    {id:'pond',label:'Pond',cat:'world',color:'#00e5ff',emoji:'🌊'},
    {id:'flow',label:'Flow',cat:'world',color:'#8b5cf6',emoji:'🌀'},
    {id:'flow2',label:'Flow v2',cat:'world',color:'#a78bfa',emoji:'💫'},
    {id:'earth',label:'Earth',cat:'world',color:'#22c55e',emoji:'🌍'},
    {id:'nebula',label:'Nebula',cat:'world',color:'#c084fc',emoji:'🌌'},
    {id:'storm',label:'Storm',cat:'world',color:'#06b6d4',emoji:'⚡'},
    {id:'shatter',label:'Shatter',cat:'world',color:'#f472b6',emoji:'💥'},
    {id:'alien',label:'Alien',cat:'world',color:'#ef4444',emoji:'👾'},
    {id:'bubbles',label:'Bubbles',cat:'game',color:'#50fa7b',emoji:'🫧'},
    {id:'fruits',label:'Fruits',cat:'game',color:'#fbbf24',emoji:'🍉'},
];

let toastTimer=null;
const processCanvas=document.createElement('canvas');const processCtx=processCanvas.getContext('2d',{willReadFrequently:true});

// ═══════════════════════════════════════════════════
//  GESTURE CLASSIFICATION (improved accuracy)
// ═══════════════════════════════════════════════════
function dist3(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+((a.z||0)-(b.z||0))**2)}

function isFingerExtended(lm,finger){
    const map={thumb:[1,2,3,4],index:[5,6,7,8],middle:[9,10,11,12],ring:[13,14,15,16],pinky:[17,18,19,20]};
    const[mcp,pip,dip,tip]=map[finger].map(i=>lm[i]);
    if(finger==='thumb'){
        // Thumb: use cross-hand distance — tip should be far from index MCP
        const indexMcp=lm[5];
        return dist3(tip,indexMcp)>dist3(pip,indexMcp)*1.2;
    }
    // Improved: check tip is further from MCP than PIP AND tip is above PIP (uncurled)
    const tipToMcp=dist3(tip,mcp);
    const pipToMcp=dist3(pip,mcp);
    const tipToPalm=dist3(tip,lm[0]);
    const pipToPalm=dist3(pip,lm[0]);
    // Finger is extended if tip is significantly further from MCP than PIP
    // AND tip is further from palm center than DIP (not curled back)
    return tipToMcp>pipToMcp*1.5 && tipToPalm>dist3(dip,lm[0])*0.9;
}

function isCurled(lm,finger){
    const map={index:[5,6,7,8],middle:[9,10,11,12],ring:[13,14,15,16],pinky:[17,18,19,20]};
    const[mcp,pip,dip,tip]=map[finger].map(i=>lm[i]);
    const tipToMcp=dist3(tip,mcp);
    const pipToMcp=dist3(pip,mcp);
    return tipToMcp<pipToMcp*1.3;
}

function classifyHand(lm){
    const thumb=isFingerExtended(lm,'thumb');
    const index=isFingerExtended(lm,'index');
    const middle=isFingerExtended(lm,'middle');
    const ring=isFingerExtended(lm,'ring');
    const pinky=isFingerExtended(lm,'pinky');
    const ringCurled=isCurled(lm,'ring');
    const pinkyCurled=isCurled(lm,'pinky');

    // Peace: index+middle extended, ring+pinky CURLED (strict)
    if(index&&middle&&ringCurled&&pinkyCurled) return 'peace';
    // Point: only index extended, others curled
    if(index&&!middle&&ringCurled&&pinkyCurled) return 'point';
    // Fist: nothing extended (or only thumb)
    const extCount=[index,middle,ring,pinky].filter(Boolean).length;
    if(extCount===0) return 'fist';
    // Palm: 4+ fingers extended
    if(extCount>=3&&(index&&middle)) return 'palm';
    // Default
    return 'palm';
}

// ═══════════════════════════════════════════════════
//  GESTURE TOAST
// ═══════════════════════════════════════════════════
const GESTURE_META={palm:{emoji:'🖐️',label:'ROTATE',color:'#00e5ff'},fist:{emoji:'✊',label:'GRAB',color:'#ff6b6b'},point:{emoji:'☝️',label:'AIM',color:'#fbbf24'},peace:{emoji:'✌️',label:'SELECT',color:'#be78ff'}};
function showToast(state){
    const m=GESTURE_META[state];if(!m)return;
    const t=document.getElementById('gestureToast');
    document.getElementById('gestureEmoji').textContent=m.emoji;
    const n=document.getElementById('gestureName');n.textContent=m.label;n.style.color=m.color;
    document.getElementById('gestureConf').textContent='ENGAGED';
    t.classList.add('visible');n.style.animation='none';n.offsetHeight;n.style.animation='';
    document.getElementById('gestureEmoji').style.animation='none';document.getElementById('gestureEmoji').offsetHeight;document.getElementById('gestureEmoji').style.animation='';
    clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('visible'),900);
}

// ═══════════════════════════════════════════════════
//  IRON MAN HOLOGRAPHIC OVERLAY
// ═══════════════════════════════════════════════════
function drawHolo(){
    hCtx.clearRect(0,0,W,H);
    if(!holoEnabled)return;

    for(let hi=0;hi<gesture.hands.length;hi++){
        const h=gesture.hands[hi];
        const sm=handSmooth[hi];
        if(!h||!h.lm)continue;
        const lm=h.lm;

        // Smooth positions
        const lerp=0.3;
        const palmCenter={x:(lm[0].x+lm[5].x+lm[9].x+lm[13].x+lm[17].x)/5,y:(lm[0].y+lm[5].y+lm[9].y+lm[13].y+lm[17].y)/5};
        let px=mirrorX?(1-palmCenter.x)*W:palmCenter.x*W;
        let py=palmCenter.y*H;
        sm.palmX+=(px-sm.palmX)*lerp;sm.palmY+=(py-sm.palmY)*lerp;
        px=sm.palmX;py=sm.palmY;

        // Fingertip positions (screen space)
        const tips=[4,8,12,16,20].map(i=>{
            let x=mirrorX?(1-lm[i].x)*W:lm[i].x*W;
            return{x,y:lm[i].y*H};
        });

        // Update trails
        for(let ti=0;ti<5;ti++){
            sm.trails[ti].unshift({x:tips[ti].x,y:tips[ti].y});
            if(sm.trails[ti].length>TRAIL_LEN)sm.trails[ti].pop();
        }

        const state=h.state;
        const meta=GESTURE_META[state]||GESTURE_META.palm;
        const baseColor=meta.color;
        const t=time;

        // ── SCAN LINE (on first detect) ──
        if(sm.scanT<1){
            sm.scanT+=0.03;
            const scanY=py-80+sm.scanT*160;
            const scanGrad=hCtx.createLinearGradient(px-100,scanY,px+100,scanY);
            scanGrad.addColorStop(0,'transparent');
            scanGrad.addColorStop(0.3,`rgba(0,229,255,${0.6*(1-sm.scanT)})`);
            scanGrad.addColorStop(0.7,`rgba(0,229,255,${0.6*(1-sm.scanT)})`);
            scanGrad.addColorStop(1,'transparent');
            hCtx.strokeStyle=scanGrad;hCtx.lineWidth=2;
            hCtx.beginPath();hCtx.moveTo(px-100,scanY);hCtx.lineTo(px+100,scanY);hCtx.stroke();
        }

        // ── REPULSOR GLOW (palm center) ──
        const glowSize=state==='palm'?55:state==='fist'?20:35;
        const glowAlpha=state==='palm'?0.25:state==='fist'?0.4:0.15;
        const grad=hCtx.createRadialGradient(px,py,0,px,py,glowSize);
        grad.addColorStop(0,`rgba(0,229,255,${glowAlpha})`);
        grad.addColorStop(0.5,`rgba(0,229,255,${glowAlpha*0.4})`);
        grad.addColorStop(1,'transparent');
        hCtx.fillStyle=grad;hCtx.beginPath();hCtx.arc(px,py,glowSize,0,Math.PI*2);hCtx.fill();

        // Inner bright core
        const core=hCtx.createRadialGradient(px,py,0,px,py,8);
        core.addColorStop(0,`rgba(255,255,255,${glowAlpha*1.5})`);
        core.addColorStop(1,'transparent');
        hCtx.fillStyle=core;hCtx.beginPath();hCtx.arc(px,py,8,0,Math.PI*2);hCtx.fill();

        // ── ROTATING ARC RINGS ──
        for(let ring=0;ring<3;ring++){
            const r=30+ring*18;
            const speed=(ring%2===0?1:-1)*(0.8+ring*0.3);
            const startAngle=t*speed+ring*2.1;
            const arcLen=Math.PI*(0.3+ring*0.15);
            hCtx.strokeStyle=`rgba(0,229,255,${0.25-ring*0.06})`;
            hCtx.lineWidth=1.5-ring*0.3;
            hCtx.beginPath();hCtx.arc(px,py,r,startAngle,startAngle+arcLen);hCtx.stroke();
            hCtx.beginPath();hCtx.arc(px,py,r,startAngle+Math.PI,startAngle+Math.PI+arcLen*0.7);hCtx.stroke();
        }

        // ── FINGERTIP WIREFRAME POLYGON ──
        if(state==='palm'||state==='peace'){
            hCtx.strokeStyle='rgba(0,229,255,0.2)';hCtx.lineWidth=1;
            hCtx.beginPath();
            for(let ti=0;ti<5;ti++){
                if(ti===0)hCtx.moveTo(tips[ti].x,tips[ti].y);
                else hCtx.lineTo(tips[ti].x,tips[ti].y);
            }
            hCtx.closePath();hCtx.stroke();

            // Lines from palm center to each tip
            hCtx.strokeStyle='rgba(0,229,255,0.1)';
            for(let ti=0;ti<5;ti++){
                hCtx.beginPath();hCtx.moveTo(px,py);hCtx.lineTo(tips[ti].x,tips[ti].y);hCtx.stroke();
            }
        }

        // ── FINGERTIP DOTS + TRAILS ──
        for(let ti=0;ti<5;ti++){
            const trail=sm.trails[ti];
            // Trail line
            if(trail.length>2){
                hCtx.beginPath();hCtx.moveTo(trail[0].x,trail[0].y);
                for(let j=1;j<trail.length;j++){
                    hCtx.lineTo(trail[j].x,trail[j].y);
                }

        }

        hCtx.font='7px JetBrains Mono';hCtx.fillStyle='rgba(0,229,255,0.25)';
        hCtx.fillText(`${(mirrorX?1-lm[9].x:lm[9].x).toFixed(2)}, ${lm[9].y.toFixed(2)}`,wx,wy+12);

        const radius=100;
        const count=MODE_LIST.length;
        const angleStep=Math.PI*2/count;

        hCtx.globalAlpha=wheelOpacity;

        hCtx.strokeStyle='rgba(0,229,255,0.15)';hCtx.lineWidth=40;
        hCtx.beginPath();hCtx.arc(cx,cy,radius,0,Math.PI*2);hCtx.stroke();

        for(let i=0;i<count;i++){

            const isCurrent=MODE_LIST[i].id===currentMode;

            // Segment highlight
            if(isSelected){

                segGrad.addColorStop(0,MODE_LIST[i].color+'80');
                segGrad.addColorStop(1,'transparent');
                hCtx.fillStyle=segGrad;hCtx.beginPath();hCtx.arc(mx,my,30,0,Math.PI*2);hCtx.fill();
            }

            // Icon
            hCtx.font=isSelected?'22px Arial':'16px Arial';
            hCtx.textAlign='center';hCtx.textBaseline='middle';
            hCtx.fillText(MODE_LIST[i].emoji,mx,my);

            // Label
            hCtx.font=`${isSelected?'bold ':''}8px Orbitron`;
            hCtx.fillStyle=isSelected?MODE_LIST[i].color:'rgba(255,255,255,0.5)';
            hCtx.fillText(MODE_LIST[i].label,mx,my+18);

            // Current mode indicator
            if(isCurrent){
                hCtx.strokeStyle=MODE_LIST[i].color;hCtx.lineWidth=1.5;
                hCtx.beginPath();hCtx.arc(mx,my,22,0,Math.PI*2);hCtx.stroke();
            }
        }

        // Center text
        if(wheelSelected>=0){
            hCtx.font='bold 11px Orbitron';hCtx.fillStyle='#fff';hCtx.textAlign='center';hCtx.textBaseline='middle';
            hCtx.fillText(MODE_LIST[wheelSelected].label.toUpperCase(),cx,cy);
        }

        hCtx.globalAlpha=1;
    }
}

// ═══════════════════════════════════════════════════
//  MEDIAPIPE RESULTS HANDLER
// ═══════════════════════════════════════════════════
function onResults(results){
    gesture.count=0;gesture.h1=null;gesture.h2=null;gesture.fist=false;gesture.hands=[];

    const hc=results.multiHandLandmarks?results.multiHandLandmarks.length:0;
    handStatusEl.textContent=`Hands: ${hc}`;

    if(hc===0){
        statusEl.textContent='Searching…';statusEl.className='badge b-status loading';
        gestureHudEl.textContent='—';
        for(let i=0;i<2;i++){handSmooth[i].state='none';handSmooth[i].scanT=0;handSmooth[i].trails=[[],[],[],[],[]]}
        return;
    }

    statusEl.textContent='Tracking';statusEl.className='badge b-status';
    gesture.count=hc;

    for(let i=0;i<hc;i++){
        const lm=results.multiHandLandmarks[i];
        // FIX: Swap labels when mirrored (MediaPipe labels from camera perspective)
        let rawLabel=results.multiHandedness[i].label;
        let label=mirrorX?(rawLabel==='Left'?'Right':'Left'):rawLabel;

        const state=classifyHand(lm);
        const hx=mirrorX?1-lm[9].x:lm[9].x;
        const hy=lm[9].y;

        const hData={x:hx,y:hy,state,label,lm,fist:state==='fist'};
        gesture.hands.push(hData);

        if(i===0){gesture.h1=hData;gesture.fist=hData.fist}
        if(i===1){
            gesture.h2=hData;gesture.fist=gesture.h1.fist||hData.fist;
            gesture.dist=Math.hypot(gesture.h1.x-gesture.h2.x,gesture.h1.y-gesture.h2.y);
            gesture.zoom=gesture.dist;
            gesture.angle=Math.atan2(gesture.h2.y-gesture.h1.y,gesture.h1.x-gesture.h2.x);
            gesture.midX=(gesture.h1.x+gesture.h2.x)/2;gesture.midY=(gesture.h1.y+gesture.h2.y)/2;
        }

        // State transition detection for toast
        const sm=handSmooth[i];
        if(state!==sm.state){
            sm.prevState=sm.state;sm.state=state;sm.stateTime=0;
            if(state!=='none')sm.scanT=0; // reset scan on new state
        }else{sm.stateTime+=33}
        if(sm.stateTime>250&&sm.stateTime<300&&state!=='none'){showToast(state)}
    }

    // Reset unused hand slots
    for(let i=hc;i<2;i++){handSmooth[i].state='none';handSmooth[i].trails=[[],[],[],[],[]]}

    // HUD gesture label
    const labels=gesture.hands.filter(h=>h.state!=='none').map(h=>{const m=GESTURE_META[h.state]||{};return `${m.emoji||''} ${m.label||h.state}`});
    gestureHudEl.textContent=labels.join(' | ')||'—';

    // ── RADIAL WHEEL LOGIC ──
    const peaceHand=gesture.hands.findIndex(h=>h.state==='peace');
    const otherHand=gesture.hands.findIndex((h,i)=>i!==peaceHand);

    if(peaceHand>=0){
        if(!wheelActive){wheelActive=true;wheelHand=peaceHand}
        wheelOpacity+=(1-wheelOpacity)*.12;

        // Use the OTHER hand (or same hand if only one) to select
        const selector=otherHand>=0?gesture.hands[otherHand]:gesture.hands[peaceHand];
        const sm=handSmooth[wheelHand>=0?wheelHand:0];
        const dx=selector.x*W-sm.palmX,dy=selector.y*H-sm.palmY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>40){
            const angle=Math.atan2(dy,dx)+Math.PI/2; // -PI/2 offset so top=0
            let norm=((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
            wheelSelected=Math.floor(norm/(Math.PI*2)*MODE_LIST.length)%MODE_LIST.length;
        }

        // Fist on other hand = confirm selection
        if(otherHand>=0&&gesture.hands[otherHand].state==='fist'&&wheelSelected>=0){
            const sel=MODE_LIST[wheelSelected];
            setMode(sel.id,sel.cat);
            wheelActive=false;wheelOpacity=0;
        }
    }else{
        if(wheelActive&&wheelSelected>=0){
            // Peace released — confirm whatever was selected
            const sel=MODE_LIST[wheelSelected];
            setMode(sel.id,sel.cat);
        }
        wheelActive=false;wheelOpacity+=(0-wheelOpacity)*.15;
        if(wheelOpacity<0.01)wheelSelected=-1;
    }
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function animate(){
    requestAnimationFrame(animate);
    const now=performance.now(),dt=Math.min((now-lastFrameTime)/1000,0.05);
    lastFrameTime=now;time+=dt;
    frameCount++;if(frameCount%30===0)fpsEl.textContent=Math.round(1/dt)+' fps';

    // ── IRON MAN CONTROLS ──
    if(currentCategory==='world'&&activeWorld&&!wheelActive){
        let tScale=s_scale,tRotZ=s_rotZ,tRotX=s_rotX,tRotY=s_rotY;

        // Two hands = scale + rotate
        if(gesture.count===2){
            tScale=Math.max(.1,gesture.zoom*3.5);
            tRotZ=gesture.angle;
            tRotX=(gesture.midY-.5)*Math.PI;
            tRotY=(gesture.midX-.5)*Math.PI;
        }
        // One hand palm = rotate by hand position
        else if(gesture.count===1&&gesture.h1){
            if(gesture.h1.state==='palm'){
                tRotY=(gesture.h1.x-.5)*Math.PI*1.5;
                tRotX=(gesture.h1.y-.5)*Math.PI;
            }
            // One hand fist = drag/translate worldGroup
            else if(gesture.h1.state==='fist'){
                const targetX=(gesture.h1.x-.5)*30;
                const targetY=(0.5-gesture.h1.y)*20;
                worldGroup.position.x+=(targetX-worldGroup.position.x)*.08;
                worldGroup.position.y+=(targetY-worldGroup.position.y)*.08;
            }
            // One hand point = interact with particles
            else if(gesture.h1.state==='point'){
                // Point interaction handled below via pm()
            }
        }
        else if(gesture.count===0){
            tScale=1;
            // Gentle auto-drift back to center
            worldGroup.position.x*=0.97;worldGroup.position.y*=0.97;
            if(currentMode==='alien'){tRotX=s_rotX+.003;tRotY=s_rotY+.005}
        }

        s_scale+=(tScale-s_scale)*.06;
        let dr=tRotZ-s_rotZ;while(dr>Math.PI)dr-=6.28;while(dr<-Math.PI)dr+=6.28;s_rotZ+=dr*.09;
        s_rotX+=(tRotX-s_rotX)*.06;s_rotY+=(tRotY-s_rotY)*.06;
        s_fist+=((gesture.fist?1:0)-s_fist)*.06;
        worldGroup.scale.set(s_scale,s_scale,s_scale);
        worldGroup.rotation.set(s_rotX,s_rotY,s_rotZ);

        activeWorld.up(dt);

        // Particle interaction — point or any hand
        if(gesture.h1){let w=s2w(gesture.h1.x*W,gesture.h1.y*H);if(w.hit)activeWorld.pm(w.x,w.z,.5+s_fist*2)}
        if(gesture.h2){let w=s2w(gesture.h2.x*W,gesture.h2.y*H);if(w.hit)activeWorld.pm(w.x,w.z,.5+s_fist*2)}

        if(currentMode==='flow'||currentMode==='flow2'){renderer.autoClearColor=false;if(!camView){fadeMat.color.setRGB(activeWorld.bg[0],activeWorld.bg[1],activeWorld.bg[2]);renderer.render(fadeScene,orthoCamera)}renderer.render(scene,camera)}
        else{renderer.autoClearColor=true;renderer.setClearAlpha(camView?0:1);renderer.render(scene,camera)}
    }
    else if(currentCategory==='game'){
        gCtx.clearRect(0,0,W,H);
        if(Math.random()<(currentMode==='bubbles'?.03:.02))spawnEnt();
        for(let i=entities.length-1;i>=0;i--){let e=entities[i];e.y-=e.sy;
        if(currentMode==='bubbles'){e.w+=.05;e.x+=Math.sin(e.w)*.5+e.sx}
        gCtx.save();gCtx.translate(e.x,e.y);
        if(currentMode==='bubbles'){gCtx.beginPath();gCtx.arc(0,0,e.r,0,6.28);gCtx.fillStyle=e.color+'40';gCtx.fill();gCtx.strokeStyle=e.color;gCtx.lineWidth=2;gCtx.stroke()}
        else{gCtx.font=`${e.r*2}px Arial`;gCtx.textAlign='center';gCtx.textBaseline='middle';gCtx.fillText(e.emoji,0,0)}
        gCtx.restore();
        let hit=false;
        if(gesture.h1&&Math.hypot(gesture.h1.x*W-e.x,gesture.h1.y*H-e.y)<e.r+30)hit=true;
        if(gesture.h2&&Math.hypot(gesture.h2.x*W-e.x,gesture.h2.y*H-e.y)<e.r+30)hit=true;
        if(hit){splash(e.x,e.y,e.color,currentMode==='fruits');gameScore+=currentMode==='fruits'?15:1;scoreEl.innerText=gameScore;entities.splice(i,1)}
        else if(e.y+e.r<-100)entities.splice(i,1)}
        for(let i=particles2D.length-1;i>=0;i--){let p=particles2D[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.4;p.alpha-=.03;if(p.alpha<=0){particles2D.splice(i,1);continue}
        gCtx.beginPath();gCtx.arc(p.x,p.y,p.r,0,6.28);gCtx.fillStyle=p.isFruit?`${p.color}${p.alpha})`:p.color;gCtx.globalAlpha=p.isFruit?1:p.alpha;gCtx.fill();gCtx.globalAlpha=1}
    }

    // Iron Man overlay (always draws on top)
    drawHolo();
}

// ═══════════════════════════════════════════════════
//  CAMERA BOOTSTRAP
// ═══════════════════════════════════════════════════
let activeStream=null,isProcessing=false,currentDeviceId=null,lastVideoTime=-1;

async function getCameras(){
    try{
        await navigator.mediaDevices.getUserMedia({video:true});
        const devs=await navigator.mediaDevices.enumerateDevices();
        const vids=devs.filter(d=>d.kind==='videoinput');
        camSelect.innerHTML='';
        vids.forEach((d,i)=>{const o=document.createElement('option');o.value=d.deviceId;o.text=d.label?.replace(/facing back/i,'Back').replace(/facing front/i,'Front')||`Camera ${i+1}`;camSelect.appendChild(o)});
        camSelect.addEventListener('change',()=>startCam(camSelect.value));
        if(vids.length>0){const fc=vids.find(d=>d.label?.toLowerCase().includes('front'));startCam(fc?fc.deviceId:vids[0].deviceId)}
    }catch(e){statusEl.textContent='Cam Error';statusEl.className='badge b-status error'}
}

async function startCam(deviceId){
    if(activeStream){activeStream.getTracks().forEach(t=>t.stop());videoElement.srcObject=null;await new Promise(r=>setTimeout(r,300))}
    currentDeviceId=deviceId;statusEl.textContent='Init…';statusEl.className='badge b-status loading';
    for(let i=0;i<camSelect.options.length;i++){if(camSelect.options[i].value===deviceId){camSelect.selectedIndex=i;break}}
    let cs={video:deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720}}:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}};
    try{activeStream=await navigator.mediaDevices.getUserMedia(cs)}catch(e){try{cs={video:{deviceId}};activeStream=await navigator.mediaDevices.getUserMedia(cs)}catch(e2){statusEl.textContent='CAM ERR';statusEl.className='badge b-status error';return}}
    videoElement.srcObject=activeStream;
    try{await videoElement.play();if(!isProcessing){isProcessing=true;processLoop()}}catch(e){statusEl.textContent='ERR';statusEl.className='badge b-status error'}
}

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.65,minTrackingConfidence:0.6});
hands.onResults(onResults);

async function processLoop(){
    if(!isProcessing)return;
    if(!videoElement.paused&&!videoElement.ended&&videoElement.readyState>=2){
        if(videoElement.currentTime!==lastVideoTime){
            lastVideoTime=videoElement.currentTime;
            if(camRotation===0){await hands.send({image:videoElement})}
            else{const vw=videoElement.videoWidth,vh=videoElement.videoHeight;
            if(vw&&vh){if(camRotation===90||camRotation===270){processCanvas.width=vh;processCanvas.height=vw}else{processCanvas.width=vw;processCanvas.height=vh}
            processCtx.save();processCtx.translate(processCanvas.width/2,processCanvas.height/2);processCtx.rotate(camRotation*Math.PI/180);processCtx.drawImage(videoElement,-vw/2,-vh/2,vw,vh);processCtx.restore();
            await hands.send({image:processCanvas})}}
        }
    }
    requestAnimationFrame(processLoop);
}

window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();gameCanvas.width=hudCanvas.width=W;gameCanvas.height=hudCanvas.height=H});

// BOOT
setMode('pond','world');
animate();
getCameras();
</script>
