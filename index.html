<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Iron Hand — Gesture Vision Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;font-family:'JetBrains Mono',monospace;user-select:none;touch-action:none;overscroll-behavior:none}

video{position:absolute;top:max(52px,calc(env(safe-area-inset-top,14px) + 42px));left:max(14px,env(safe-area-inset-left,14px));width:140px;height:105px;object-fit:cover;z-index:15;opacity:0;transition:opacity .3s;transform:scaleX(-1);border-radius:6px;border:1px solid rgba(0,229,255,0.3);box-shadow:0 2px 12px rgba(0,0,0,0.6);pointer-events:none}
video.cam-on{opacity:1}
#three-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:1}
#game-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:2;display:none}
#hud-canvas{position:absolute;top:0;left:0;width:100vw;height:100dvh;z-index:3;pointer-events:none}

/* ── HUD badges ── */
#hud{position:absolute;top:max(14px,env(safe-area-inset-top,14px));left:max(14px,env(safe-area-inset-left,14px));z-index:10;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.hud-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:5px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap}
.b-status{background:rgba(0,255,120,0.12);color:#00ff78;border:1px solid rgba(0,255,120,0.25)}
.b-status.loading{color:#ffaa00;background:rgba(255,170,0,0.12);border-color:rgba(255,170,0,0.25)}
.b-status.error{color:#ff4466;background:rgba(255,68,102,0.12);border-color:rgba(255,68,102,0.25)}
.b-info{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1)}
.b-hands{background:rgba(0,200,255,0.1);color:#00c8ff;border:1px solid rgba(0,200,255,0.2)}
.b-gesture{background:rgba(190,120,255,0.12);color:#be78ff;border:1px solid rgba(190,120,255,0.3);font-weight:700}

/* ── Top controls ── */
#top-controls{position:absolute;top:max(14px,env(safe-area-inset-top,14px));right:max(14px,env(safe-area-inset-right,14px));z-index:20;display:flex;gap:5px}

/* ── Game UI ── */
#game-ui{position:absolute;top:max(55px,env(safe-area-inset-top,55px));right:max(24px,env(safe-area-inset-right,24px));z-index:10;display:none;font-size:20px;color:#00e5ff;font-weight:bold;font-family:'Orbitron',sans-serif;text-shadow:0 0 15px rgba(0,229,255,0.5);pointer-events:none}

/* ── Bottom UI ── */
#ui{position:absolute;bottom:max(10px,env(safe-area-inset-bottom,10px));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:5px;z-index:10;align-items:center;width:100%;max-width:920px;padding:0 8px;transition:opacity .3s,transform .3s}
.panel{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:4px;background:rgba(5,5,15,0.85);padding:5px 8px;border-radius:8px;border:1px solid rgba(0,229,255,0.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);width:100%}
.btn{padding:6px 10px;border-radius:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:inherit;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:rgba(0,229,255,0.08);color:#fff}
.btn.active{background:rgba(0,229,255,0.15);color:#00e5ff;border-color:rgba(0,229,255,0.4)}
.btn-alien{color:#ff4444;border-color:rgba(255,68,68,0.2)}.btn-alien.active{background:rgba(255,68,68,0.15);color:#ff4444;border-color:rgba(255,68,68,0.5)}
.btn-game{color:#50fa7b;border-color:rgba(80,250,123,0.2)}.btn-game.active{background:rgba(80,250,123,0.15);color:#50fa7b;border-color:rgba(80,250,123,0.5)}
.divider{width:1px;background:rgba(0,229,255,0.2);margin:0 2px;height:16px}
.cam-select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(0,229,255,0.3);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:9px;max-width:120px;outline:none;cursor:pointer}
.cam-select option{background:#111;color:#fff}
.ctrl-group{display:flex;align-items:center;gap:4px;font-size:8px;color:rgba(0,229,255,0.6);text-transform:uppercase}
.ctrl-group input[type=range]{width:50px;height:3px;accent-color:#00e5ff;cursor:pointer}
@media(max-width:600px){.btn{padding:4px 6px;font-size:7px}.panel{padding:4px 6px;gap:2px}.cam-select{max-width:90px;font-size:7px}}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>
<canvas id="game-canvas"></canvas>
<canvas id="hud-canvas"></canvas>

<div id="hud">
    <div class="hud-row"><div class="badge b-status loading" id="status">Init…</div><div class="badge b-info" id="fpsDisplay">-- fps</div></div>
    <div class="hud-row"><div class="badge b-hands" id="handStatus">Hands: 0</div><div class="badge b-gesture" id="gestureHud">—</div></div>
</div>

<div id="top-controls">
    <button class="btn" id="btn-ui-toggle" onclick="toggleUI()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">☰</button>
    <button class="btn" id="btn-cam-view" onclick="toggleCamView()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">📷</button>
    <button class="btn" onclick="toggleFS()" style="padding:4px 7px;font-size:12px;background:rgba(0,0,0,0.5)">⛶</button>
</div>
<div id="game-ui">SCORE: <span id="score">0</span></div>

<div id="ui">
    <div class="panel" id="flow-opts" style="display:none;background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.25)">
        <div class="ctrl-group"><span>Rot</span><input type="range" id="s-rot" min="0" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Spd</span><input type="range" id="s-int" min="0" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Rad</span><input type="range" id="s-rad" min="0.2" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span>Frc</span><input type="range" id="s-frc" min="0" max="3" step="0.1" value="1"></div>
    </div>
    <div class="panel" id="vortex-opts" style="display:none;background:rgba(190,120,255,0.08);border-color:rgba(190,120,255,0.3)">
        <div class="ctrl-group"><span style="color:#be78ff">Speed</span><input type="range" id="v-speed" min="0" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span style="color:#be78ff">Density</span><input type="range" id="v-density" min="0.1" max="3" step="0.1" value="1"></div>
        <div class="ctrl-group"><span style="color:#be78ff">Wave</span><input type="range" id="v-wave" min="0" max="5" step="0.1" value="1.5"></div>
        <div class="ctrl-group"><span style="color:#ffb86c">Gravity</span><input type="range" id="v-gravity" min="0" max="5" step="0.1" value="1"></div>
        <div class="ctrl-group"><span style="color:#ff5555">Accel</span><input type="range" id="v-accel" min="0" max="10" step="0.1" value="2"></div>
    </div>
    <div class="panel">
        <button class="btn mode-btn active" id="btn-pond" onclick="setMode('pond','world')">Pond</button>
        <button class="btn mode-btn" id="btn-flow" onclick="setMode('flow','world')">Flow</button>
        <button class="btn mode-btn" id="btn-flow2" onclick="setMode('flow2','world')">Flow v2</button>
        <button class="btn mode-btn" id="btn-smear" onclick="setMode('smear','world')">Smear</button>
        <button class="btn mode-btn" id="btn-vortex" onclick="setMode('vortex','world')" style="color:#be78ff">Vortex</button>
        <button class="btn mode-btn" id="btn-earth" onclick="setMode('earth','world')">Earth</button>
        <button class="btn mode-btn" id="btn-nebula" onclick="setMode('nebula','world')">Nebula</button>
        <button class="btn mode-btn" id="btn-storm" onclick="setMode('storm','world')">Storm</button>
        <button class="btn mode-btn" id="btn-shatter" onclick="setMode('shatter','world')">Shatter</button>
        <button class="btn mode-btn btn-alien" id="btn-alien" onclick="setMode('alien','world')">Alien</button>
    </div>
    <div class="panel">
        <button class="btn mode-btn btn-game" id="btn-bubbles" onclick="setMode('bubbles','game')">🫧 Bubbles</button>
        <button class="btn mode-btn btn-game" id="btn-fruits" onclick="setMode('fruits','game')">🍉 Fruits</button>
        <div class="divider"></div>
        <button class="btn res active" onclick="setRes('low')" id="res-low">Low</button>
        <button class="btn res" onclick="setRes('med')" id="res-med">Med</button>
        <button class="btn res" onclick="setRes('high')" id="res-high">High</button>
    </div>
    <div class="panel" style="background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.3)">
        <select id="cam-select" class="cam-select"></select>
        <button class="btn" onclick="toggleCamRotation()" style="background:transparent;border:none;padding:1px;margin:0 2px">
            <svg id="phone-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .3s"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><circle cx="12" cy="18" r="1"/></svg>
        </button>
        <span id="cam-deg" style="font-size:11px;color:#00e5ff;font-weight:900;width:22px;text-align:right;margin-right:2px;font-family:Orbitron">0°</span>
        <div class="divider" style="height:20px;background:rgba(0,229,255,0.2)"></div>
        <button class="btn active" id="btn-mirror" onclick="toggleMirror()">🪞 Flip</button>
        <button class="btn active" id="btn-holo" onclick="toggleHolo()">✨ Holo</button>
        <button class="btn active" id="btn-skeleton" onclick="toggleSkeleton()">🦴 Skel</button>
        <button class="btn active" id="btn-sound" onclick="toggleSound()">🔊 Sound</button>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  REFS & STATE
// ═══════════════════════════════════════════════════
const videoElement=document.getElementById('cam'),threeCanvas=document.getElementById('three-canvas'),gameCanvas=document.getElementById('game-canvas'),hudCanvas=document.getElementById('hud-canvas');
const gCtx=gameCanvas.getContext('2d'),hCtx=hudCanvas.getContext('2d');
const statusEl=document.getElementById('status'),fpsEl=document.getElementById('fpsDisplay'),gestureHudEl=document.getElementById('gestureHud'),handStatusEl=document.getElementById('handStatus'),scoreEl=document.getElementById('score'),camSelect=document.getElementById('cam-select');

let W=window.innerWidth,H=window.innerHeight;
gameCanvas.width=hudCanvas.width=W;gameCanvas.height=hudCanvas.height=H;

let lastFrameTime=performance.now(),frameCount=0,time=0;
let currentMode='pond',currentCategory='world',currentRes='low';
let resMult=0.3,gameScore=0,camRotation=0,mirrorX=true,uiVisible=true,camView=false,holoEnabled=true,skeletonEnabled=true;

// Gesture state
let gesture={count:0,fist:false,h1:null,h2:null,hands:[]};
let s_scale=1,s_rotZ=0,s_rotX=0,s_rotY=0,s_fist=0;
let dragOffsetX=0,dragOffsetY=0,isDragging=false;
let zoomBaseDist=null,zoomBaseScale=1,wasTwoHands=false;


// ═══════════════════════════════════════════════════
//  AUDIO ENGINE — particle-physics driven, not hand-event driven
//  All sound comes from what the particles ARE doing:
//  rotation speed, fist collapse, wave frequency, mode ambience.
//  Zero hand/gesture event sounds.
// ═══════════════════════════════════════════════════
const Audio = (()=>{
    let ctx=null, master=null, soundEnabled=true;

    // Running oscillators — always on, modulated each frame
    let osc1=null, gain1=null;   // primary drone (root)
    let osc2=null, gain2=null;   // fifth / texture
    let osc3=null, gain3=null;   // rotation layer — pitch tracks rotation speed
    let lfo=null,  lfoG=null;    // LFO modulating osc1 detune

    // Smoothed physics values for audio (extra smoothing so no pops)
    let sFist=0, sRot=0, sScale=1, sTime=0;

    // Mode root frequencies
    const ROOTS={
        pond:55, flow:44, flow2:44, smear:60, vortex:35,
        earth:55, nebula:110, storm:41, shatter:82,
        alien:55, bubbles:110, fruits:82
    };
    let rootFreq=55;

    function init(){
        if(ctx) return;
        try{
            ctx=new(window.AudioContext||window.webkitAudioContext)();
            master=ctx.createGain(); master.gain.value=0;
            master.connect(ctx.destination);
            buildGraph();
        }catch(e){ctx=null;}
    }

    function resume(){
        if(ctx && ctx.state==='suspended') ctx.resume();
    }

    function buildGraph(){
        if(!ctx) return;
        const t=ctx.currentTime;

        // LFO — slow wobble on pitch
        lfo=ctx.createOscillator(); lfoG=ctx.createGain();
        lfo.frequency.value=0.2; lfoG.gain.value=8; // ±8 cents
        lfo.connect(lfoG); lfo.start(t);

        // Osc1 — root drone
        osc1=ctx.createOscillator(); gain1=ctx.createGain();
        osc1.type='sine'; osc1.frequency.value=rootFreq;
        lfoG.connect(osc1.detune); // LFO modulates pitch
        gain1.gain.value=0.5;
        osc1.connect(gain1); gain1.connect(master); osc1.start(t);

        // Osc2 — perfect fifth above root (×1.5)
        osc2=ctx.createOscillator(); gain2=ctx.createGain();
        osc2.type='sine'; osc2.frequency.value=rootFreq*1.5;
        gain2.gain.value=0.3;
        osc2.connect(gain2); gain2.connect(master); osc2.start(t);

        // Osc3 — rotation layer, starts silent
        osc3=ctx.createOscillator(); gain3=ctx.createGain();
        osc3.type='sine'; osc3.frequency.value=rootFreq*2;
        gain3.gain.value=0;
        osc3.connect(gain3); gain3.connect(master); osc3.start(t);
    }

    function setMode(mode){
        if(!ctx) return;
        rootFreq = ROOTS[mode]||55;
        const t=ctx.currentTime;
        // Glide all oscillators to new root over 1.5s — smooth transition
        if(osc1) osc1.frequency.setTargetAtTime(rootFreq,       t, 0.5);
        if(osc2) osc2.frequency.setTargetAtTime(rootFreq*1.5,   t, 0.5);
        if(osc3) osc3.frequency.setTargetAtTime(rootFreq*2,     t, 0.5);
        if(lfo){
            // LFO speed varies by mode — slow for pond, faster for storm/vortex
            const lfoSpeed={pond:0.12,flow:0.18,flow2:0.18,smear:0.15,vortex:0.35,
                            storm:0.6,shatter:0.4,nebula:0.08,earth:0.1,alien:0.25,
                            bubbles:0.2,fruits:0.2}[mode]||0.2;
            lfo.frequency.setTargetAtTime(lfoSpeed, t, 0.3);
        }
        // LFO depth varies — pond=gentle, storm=wild
        if(lfoG){
            const depth={pond:5,flow:8,flow2:8,smear:6,vortex:12,
                         storm:20,shatter:15,nebula:3,earth:4,alien:18,
                         bubbles:6,fruits:6}[mode]||8;
            lfoG.gain.setTargetAtTime(depth, t, 0.3);
        }
        // Fade in master when mode starts
        if(master) master.gain.setTargetAtTime(soundEnabled?0.8:0, t, 0.6);
    }

    // Called every frame from animate() with physics state
    function tick(dt, mode, fistVal, rotSpeed, scaleVal){
        if(!ctx||!soundEnabled) return;
        if(ctx.state==='suspended') ctx.resume();
        const t=ctx.currentTime;

        // Extra smoothing on physics values — prevents audio zipper noise
        sFist  += (fistVal  - sFist ) * 0.04;
        sRot   += (rotSpeed - sRot  ) * 0.03;
        sScale += (scaleVal - sScale) * 0.03;

        if(!osc1) return;

        // ── Osc1 gain — mode-specific base + fist compression ──
        // Fist: particles collapse → drone gets louder and slightly lower
        const fistBoost = sFist * 0.04;
        const baseVol = {
            pond:0.5, flow:0.45, flow2:0.45, smear:0.5,
            vortex:0.55, earth:0.4, nebula:0.35, storm:0.55,
            shatter:0.5, alien:0.55, bubbles:0.4, fruits:0.4
        }[mode]||0.5;
        gain1.gain.setTargetAtTime(baseVol + fistBoost, t, 0.08);

        // Fist pulls pitch down slightly (particles imploding = lower pitch)
        osc1.frequency.setTargetAtTime(rootFreq * (1 - sFist*0.08), t, 0.1);
        osc2.frequency.setTargetAtTime(rootFreq * 1.5 * (1 - sFist*0.04), t, 0.1);

        // ── Osc3 — rotation layer ──
        // Only audible when world is actually rotating (bothFists spin)
        // Pitch rises with rotation speed — feels like a gyroscope winding up
        const rotVol = Math.min(sRot * 0.15, 0.05);
        const rotPitch = rootFreq * 2 * (1 + sRot * 1.2);
        gain3.gain.setTargetAtTime(rotVol, t, 0.06);
        osc3.frequency.setTargetAtTime(rotPitch, t, 0.08);

        // ── Osc2 gain — zoom/scale layer ──
        // Scale > 1 (zoom in) brightens the fifth; scale < 1 dims it
        const scaleNorm = Math.max(0, sScale - 1); // 0 at default, positive when zoomed
        gain2.gain.setTargetAtTime(0.02 + scaleNorm * 0.025, t, 0.1);
    }

    function toggle(){
        if(!ctx) init();
        soundEnabled=!soundEnabled;
        if(master) master.gain.setTargetAtTime(soundEnabled?0.8:0, ctx.currentTime, 0.2);
        if(soundEnabled) setMode(currentMode);
        const b=document.getElementById('btn-sound');
        if(b){b.classList.toggle('active',soundEnabled);b.textContent=soundEnabled?'🔊 Sound':'🔇 Sound';}
    }

    // Stubs for old hook calls — do nothing now
    function onModeSwitch(){}
    function onGestureChange(){}
    function onHandCountChange(){}
    function onBothFists(){}
    function startAmbient(mode){ resume(); setMode(mode); }
    function stopAmbient(){}

    return{init, startAmbient, stopAmbient, setMode, tick,
           onModeSwitch, onGestureChange, onHandCountChange, onBothFists, toggle};
})();
window.toggleSound=()=>Audio.toggle();


// Per-hand smoothed positions + trails (Updated with tip tracking interpolation)
const TRACKING_SMOOTH_FACTOR = 0.35;
const handSmooth=[
    {x:0,y:0,tips:[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}],palmX:0,palmY:0,state:'none',prevState:'none',stateTime:0,scanT:0,trails:[[],[],[],[],[]]},
    {x:0,y:0,tips:[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}],palmX:0,palmY:0,state:'none',prevState:'none',stateTime:0,scanT:0,trails:[[],[],[],[],[]]},
];
const TRAIL_LEN=12;

let toastTimer=null;
const processCanvas=document.createElement('canvas');const processCtx=processCanvas.getContext('2d',{willReadFrequently:true});

// ═══════════════════════════════════════════════════
//  GESTURE CLASSIFICATION
// ═══════════════════════════════════════════════════
function dist3(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+((a.z||0)-(b.z||0))**2)}
function isFingerExtended(lm,finger){
    const map={thumb:[1,2,3,4],index:[5,6,7,8],middle:[9,10,11,12],ring:[13,14,15,16],pinky:[17,18,19,20]};
    const[mcp,pip,dip,tip]=map[finger].map(i=>lm[i]);
    if(finger==='thumb'){
        const indexMcp=lm[5];
        return dist3(tip,indexMcp)>dist3(pip,indexMcp)*1.2;
    }
    const tipToMcp=dist3(tip,mcp);
    const pipToMcp=dist3(pip,mcp);
    const tipToPalm=dist3(tip,lm[0]);
    return tipToMcp>pipToMcp*1.5 && tipToPalm>dist3(dip,lm[0])*0.9;
}
function isCurled(lm,finger){
    const map={index:[5,6,7,8],middle:[9,10,11,12],ring:[13,14,15,16],pinky:[17,18,19,20]};
    const[mcp,pip,dip,tip]=map[finger].map(i=>lm[i]);
    const tipToMcp=dist3(tip,mcp);
    const pipToMcp=dist3(pip,mcp);
    return tipToMcp<pipToMcp*1.3;
}
function classifyHand(lm){
    const thumb=isFingerExtended(lm,'thumb');
    const index=isFingerExtended(lm,'index');
    const middle=isFingerExtended(lm,'middle');
    const ring=isFingerExtended(lm,'ring');
    const pinky=isFingerExtended(lm,'pinky');
    const ringCurled=isCurled(lm,'ring');
    const pinkyCurled=isCurled(lm,'pinky');
    if(index&&middle&&ringCurled&&pinkyCurled) return 'peace';
    if(index&&!middle&&ringCurled&&pinkyCurled) return 'point';
    const extCount=[index,middle,ring,pinky].filter(Boolean).length;
    if(extCount===0) return 'fist';
    if(extCount>=3&&(index&&middle)) return 'palm';
    return 'palm';
}

const GESTURE_META={palm:{emoji:'🖐️',label:'OPEN',color:'#00e5ff'},fist:{emoji:'✊',label:'FIST',color:'#ff6b6b'},point:{emoji:'☝️',label:'AIM',color:'#fbbf24'},peace:{emoji:'✌️',label:'PEACE',color:'#be78ff'}};

// ═══════════════════════════════════════════════════
//  IRON MAN HOLOGRAPHIC OVERLAY
// ═══════════════════════════════════════════════════
function drawHolo(){
    hCtx.clearRect(0,0,W,H);
    if(!holoEnabled)return;

        const h=gesture.hands[hi];
        const sm=handSmooth[hi];

        const lerp=0.3;
        const palmCenter={x:(lm[0].x+lm[5].x+lm[9].x+lm[13].x+lm[17].x)/5,y:(lm[0].y+lm[5].y+lm[9].y+lm[13].y+lm[17].y)/5};
        let px=mirrorX?(1-palmCenter.x)*W:palmCenter.x*W;
        let py=palmCenter.y*H;
        sm.palmX+=(px-sm.palmX)*lerp;sm.palmY+=(py-sm.palmY)*lerp;
        px=sm.palmX;py=sm.palmY;

        const tips=[4,8,12,16,20].map(i=>{
            let x=mirrorX?(1-lm[i].x)*W:lm[i].x*W;
            return{x,y:lm[i].y*H};
        });

        for(let ti=0;ti<5;ti++){
            sm.trails[ti].unshift({x:tips[ti].x,y:tips[ti].y});
            if(sm.trails[ti].length>TRAIL_LEN)sm.trails[ti].pop();
        }

        const state=h.state;
        const meta=GESTURE_META[state]||GESTURE_META.palm;
        const baseColor=meta.color;
        const t=time;

        grad.addColorStop(0,`rgba(0,229,255,${glowAlpha})`);
        grad.addColorStop(0.5,`rgba(0,229,255,${glowAlpha*0.4})`);

        const core=hCtx.createRadialGradient(px,py,0,px,py,8);
        core.addColorStop(0,`rgba(255,255,255,${glowAlpha*1.5})`);
        core.addColorStop(1,'transparent');
        hCtx.fillStyle=core;hCtx.beginPath();hCtx.arc(px,py,8,0,Math.PI*2);hCtx.fill();

        for(let ring=0;ring<3;ring++){
            const r=30+ring*18;
            const speed=(ring%2===0?1:-1)*(0.8+ring*0.3);
            const startAngle=t*speed+ring*2.1;
            const arcLen=Math.PI*(0.3+ring*0.15);
            hCtx.strokeStyle=`rgba(0,229,255,${0.25-ring*0.06})`;
            hCtx.lineWidth=1.5-ring*0.3;
            hCtx.beginPath();hCtx.arc(px,py,r,startAngle,startAngle+arcLen);hCtx.stroke();
            hCtx.beginPath();hCtx.arc(px,py,r,startAngle+Math.PI,startAngle+Math.PI+arcLen*0.7);hCtx.stroke();
        }

        if(state==='palm'||state==='peace'){
            if(skeletonEnabled){
            hCtx.strokeStyle='rgba(0,229,255,0.2)';hCtx.lineWidth=1;
            hCtx.beginPath();
            for(let ti=0;ti<5;ti++){
                if(ti===0)hCtx.moveTo(tips[ti].x,tips[ti].y);
                else hCtx.lineTo(tips[ti].x,tips[ti].y);
            }
            hCtx.closePath();hCtx.stroke();

            hCtx.strokeStyle='rgba(0,229,255,0.1)';
            for(let ti=0;ti<5;ti++){
                hCtx.beginPath();hCtx.moveTo(px,py);hCtx.lineTo(tips[ti].x,tips[ti].y);hCtx.stroke();
            }
            }
        }

        for(let ti=0;ti<5;ti++){
            const trail=sm.trails[ti];
            if(skeletonEnabled&&trail.length>2){
                hCtx.beginPath();hCtx.moveTo(trail[0].x,trail[0].y);
                for(let j=1;j<trail.length;j++){
                    hCtx.lineTo(trail[j].x,trail[j].y);
                }
                hCtx.strokeStyle=`rgba(0,229,255,0.15)`;hCtx.lineWidth=1.5;hCtx.stroke();
            }
            if(skeletonEnabled){
            const tipGlow=hCtx.createRadialGradient(tips[ti].x,tips[ti].y,0,tips[ti].x,tips[ti].y,10);
            tipGlow.addColorStop(0,'rgba(0,229,255,0.6)');tipGlow.addColorStop(1,'transparent');
            hCtx.fillStyle=tipGlow;hCtx.beginPath();hCtx.arc(tips[ti].x,tips[ti].y,10,0,Math.PI*2);hCtx.fill();
            hCtx.fillStyle='rgba(255,255,255,0.8)';hCtx.beginPath();hCtx.arc(tips[ti].x,tips[ti].y,2.5,0,Math.PI*2);hCtx.fill();
            }
        }

        let wx=mirrorX?(1-lm[0].x)*W:lm[0].x*W;
        let wy=lm[0].y*H+25;
        hCtx.font='9px Orbitron';hCtx.fillStyle=`rgba(0,229,255,0.5)`;
        hCtx.textAlign='center';
        hCtx.fillText(`${state.toUpperCase()} · ${h.label}`,wx,wy);
        hCtx.font='7px JetBrains Mono';hCtx.fillStyle='rgba(0,229,255,0.25)';
        hCtx.fillText(`${(mirrorX?1-lm[9].x:lm[9].x).toFixed(2)}, ${lm[9].y.toFixed(2)}`,wx,wy+12);

        if(state==='fist'){
            hCtx.strokeStyle='rgba(255,100,100,0.3)';hCtx.lineWidth=2;hCtx.setLineDash([4,4]);
            hCtx.beginPath();hCtx.arc(px,py,25+Math.sin(t*4)*5,0,Math.PI*2);hCtx.stroke();
            hCtx.setLineDash([]);
        }

        if(state==='point'){
            const tipX=tips[1].x,tipY=tips[1].y;
            const angle=Math.atan2(tipY-py,tipX-px);
            const laserLen=200;
            const endX=tipX+Math.cos(angle)*laserLen,endY=tipY+Math.sin(angle)*laserLen;

            laserGrad.addColorStop(0.3,'rgba(251,191,36,0.15)');
            laserGrad.addColorStop(1,'transparent');
            hCtx.strokeStyle=laserGrad;hCtx.lineWidth=1.5;
            hCtx.beginPath();hCtx.moveTo(tipX,tipY);hCtx.lineTo(endX,endY);hCtx.stroke();
        }
    }
}

                if(d>1.0)discard;
                float a=exp(-d*6.0);
                vec3 cOuter=vec3(0.04,0.15,0.75);
                vec3 cMid  =vec3(0.55,0.08,0.72);
                vec3 cHot  =vec3(0.95,0.38,0.05);
                vec3 cCore =vec3(1.0, 0.92,0.80);
                vec3 col=cOuter;
                col=mix(col,cMid, smoothstep(120.0,50.0,vRadius));
                col=mix(col,cHot, smoothstep(50.0, 14.0,vRadius));
                col=mix(col,cCore,smoothstep(14.0,  3.0,vRadius));
                gl_FragColor=vec4(col,a*0.85*smoothstep(1.5,6.0,vRadius));
            }`,
        transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
    });

    var pts=new THREE.Points(geo,mat);
    pts.rotation.x=0.18;
    scene.fog=new THREE.FogExp2(0x000000,0.0008);
    worldGroup.add(pts);

    var bendX=0,bendY=0,tBX=0,tBY=0;
    var sFist=0,repelX=0,repelY=0,repelStr=0,tRepelStr=0,tRepelX=0,tRepelY=0;

    function readSliders(){
        mat.uniforms.uSpeed.value   =parseFloat(document.getElementById('v-speed')?.value  ||1);
        mat.uniforms.uDensity.value =parseFloat(document.getElementById('v-density')?.value||1);
        mat.uniforms.uWaveFreq.value=parseFloat(document.getElementById('v-wave')?.value   ||1.5);
        mat.uniforms.uGravity.value =parseFloat(document.getElementById('v-gravity')?.value||1);
        mat.uniforms.uAccel.value   =parseFloat(document.getElementById('v-accel')?.value  ||2);
    }

    function ndcToWorld(nx,ny){
        var halfH=Math.tan(75*Math.PI/360)*180;
        return{x:(nx*2-1)*(halfH*(W/H)),y:-(ny*2-1)*halfH};
    }

    return{
        m:[pts],
        dc(){camera.position.set(0,0,180);camera.lookAt(0,0,0);orbitTarget.set(0,0,0);syncOrbit();},
        bg:[0,0,0],
        up(dt){
            mat.uniforms.uTime.value=time;

            // Fast fist response
            sFist+=(((gesture.fist?1:0)-sFist)*0.18);
            mat.uniforms.uFist.value=sFist;

            // Reset targets each frame — re-accumulated below
            tBX=0;tBY=0;tRepelStr=0;

            var hc=gesture.hands.length;
            for(var hi=0;hi<hc;hi++){
                var h=gesture.hands[hi];
                if(!h||!h.lm)continue;
                var px=mirrorX?1-h.lm[9].x:h.lm[9].x;
                var py=h.lm[9].y;
                var w2=ndcToWorld(px,py);
                if(h.fist){
                    // Fist: strong warp toward hand
                    tBX+=(px-0.5)*2.2;
                    tBY+=(py-0.5)*-2.2;
                }else{
                    // Open hand: repel
                    tRepelX=w2.x; tRepelY=w2.y; tRepelStr=1.0;
                    tBX+=(px-0.5)*0.5;
                    tBY+=(py-0.5)*-0.5;
                }
            }

            // Two hands close together → crank wave freq (looks like it implodes)
            if(gesture.count===2){
                mat.uniforms.uWaveFreq.value=1.5+(1.0-gesture.dist)*4.0;
            }

            // Smooth all values
            bendX+=(tBX-bendX)*0.10;
            bendY+=(tBY-bendY)*0.10;
            repelStr+=(tRepelStr-repelStr)*0.14;
            repelX  +=(tRepelX -repelX  )*0.14;
            repelY  +=(tRepelY -repelY  )*0.14;
            mat.uniforms.uBendX.value  =bendX;
            mat.uniforms.uBendY.value  =bendY;
            mat.uniforms.uRepelStr.value=repelStr;
            mat.uniforms.uRepelX.value =repelX;
            mat.uniforms.uRepelY.value =repelY;

            // Continuous rotation — always on, slightly faster with hands
            var spinSpeed = gesture.count > 0 ? 0.0018 : 0.0008;
            pts.rotation.z += spinSpeed;
            pts.rotation.x += 0.00018;  // slow tilt wobble reveals the disc depth
            readSliders();
        },
        pm(){}
    };
}
}; // ── end Worlds

function onResults(results){
    gesture.count=0;gesture.h1=null;gesture.h2=null;gesture.fist=false;gesture.hands=[];

    const hc=results.multiHandLandmarks?results.multiHandLandmarks.length:0;
    handStatusEl.textContent=`Hands: ${hc}`;

    if(hc===0){
        Audio.onHandCountChange(gesture.count, 0);
        statusEl.textContent='Searching…';statusEl.className='badge b-status loading';
        gestureHudEl.textContent='—';
        for(let i=0;i<2;i++){
            handSmooth[i].state='none';
            handSmooth[i].scanT=0;
            handSmooth[i].trails=[[],[],[],[],[]];
            handSmooth[i].tips=[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}]; 
        }
        return;
    }

    statusEl.textContent='Tracking';statusEl.className='badge b-status';
    const prevCount = gesture.count;
    gesture.count=hc;
    Audio.onHandCountChange(prevCount, hc);

    for(let i=0;i<hc;i++){
        const lm=results.multiHandLandmarks[i];
        let rawLabel=results.multiHandedness[i].label;
        let label=mirrorX?(rawLabel==='Left'?'Right':'Left'):rawLabel;

        const state=classifyHand(lm);
        const hx=mirrorX?1-lm[9].x:lm[9].x;
        const hy=lm[9].y;

        const hData={x:hx,y:hy,state,label,lm,fist:state==='fist'};
        gesture.hands.push(hData);

        if(i===0){gesture.h1=hData;gesture.fist=hData.fist}
        if(i===1){
            gesture.h2=hData;gesture.fist=gesture.h1.fist||hData.fist;
            gesture.dist=Math.hypot(gesture.h1.x-gesture.h2.x,gesture.h1.y-gesture.h2.y);
            gesture.zoom=gesture.dist;
            gesture.angle=Math.atan2(gesture.h2.y-gesture.h1.y,gesture.h1.x-gesture.h2.x);
            gesture.midX=(gesture.h1.x+gesture.h2.x)/2;gesture.midY=(gesture.h1.y+gesture.h2.y)/2;
        }

        const sm=handSmooth[i];
        if(state!==sm.state){
            Audio.onGestureChange(sm.state, state);
            sm.prevState=sm.state;sm.state=state;sm.stateTime=0;
            if(state!=='none')sm.scanT=0; 
        }else{sm.stateTime+=33}
    }

    for(let i=hc;i<2;i++){
        handSmooth[i].state='none';
        handSmooth[i].trails=[[],[],[],[],[]];
        handSmooth[i].tips=[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}]; 
    }

    const labels=gesture.hands.filter(h=>h.state!=='none').map(h=>{const m=GESTURE_META[h.state]||{};return `${m.emoji||''} ${m.label||h.state}`});
    gestureHudEl.textContent=labels.join(' | ')||'—';
}

//  MAIN LOOP

function animate(){
    requestAnimationFrame(animate);
    const now=performance.now(),dt=Math.min((now-lastFrameTime)/1000,0.05);
    lastFrameTime=now;time+=dt;
    frameCount++;if(frameCount%30===0)fpsEl.textContent=Math.round(1/dt)+' fps';

    if(currentCategory==='world'&&activeWorld){
        let tScale=s_scale,tRotZ=s_rotZ,tRotX=s_rotX,tRotY=s_rotY;

        const bothFists=gesture.count===2&&gesture.h1&&gesture.h2&&gesture.h1.fist&&gesture.h2.fist;

        if(gesture.count===2){
            if(!wasTwoHands){zoomBaseDist=gesture.dist;zoomBaseScale=s_scale;wasTwoHands=true}
            if(zoomBaseDist>0.01){
                const ratio=gesture.dist/zoomBaseDist;
                tScale=Math.max(.2,Math.min(5,zoomBaseScale*ratio));
            }
            // Rotation & tilt ONLY when both hands are fists
            if(bothFists){
                tRotZ=gesture.angle;
                tRotX=(gesture.midY-.5)*Math.PI*.3;
                tRotY=(gesture.midX-.5)*Math.PI*.6;
            } else {
                tRotX=0;tRotY=0;tRotZ=0;
            }
        }
        else if(gesture.count===1){
            wasTwoHands=false;zoomBaseDist=null;
            tRotX=0;tRotY=0;tRotZ=0;tScale=1;
        }
        else if(gesture.count===0){
            wasTwoHands=false;zoomBaseDist=null;
            tScale=1;tRotX=0;tRotY=0;tRotZ=0;
            worldGroup.position.x*=0.97;worldGroup.position.y*=0.97;
            if(currentMode==='alien'){tRotX=s_rotX+.003;tRotY=s_rotY+.005}
        }

        s_scale+=(tScale-s_scale)*.04;
        let dr=tRotZ-s_rotZ;while(dr>Math.PI)dr-=6.28;while(dr<-Math.PI)dr+=6.28;
        if(bothFists){
            s_rotZ+=dr*.06;
            s_rotX+=(tRotX-s_rotX)*.04;s_rotY+=(tRotY-s_rotY)*.04;
        } else {
            // Fast snap to zero — 0.7^60fps ≈ gone in ~8 frames
            s_rotZ*=.7;s_rotX*=.7;s_rotY*=.7;
            if(Math.abs(s_rotX)<0.001)s_rotX=0;
            if(Math.abs(s_rotY)<0.001)s_rotY=0;
            if(Math.abs(s_rotZ)<0.001)s_rotZ=0;
        }
        s_fist+=((gesture.fist?1:0)-s_fist)*.04;
        worldGroup.scale.set(s_scale,s_scale,s_scale);
        worldGroup.rotation.set(s_rotX,s_rotY,s_rotZ);

        // Physics-driven audio: rotation magnitude, fist, scale
        const rotMag=Math.sqrt(s_rotX*s_rotX+s_rotY*s_rotY+s_rotZ*s_rotZ);
        Audio.tick(dt, currentMode, s_fist, rotMag, s_scale);
        activeWorld.up(dt);

        const TIPS=[4,8,12,16,20];
        for(let hi=0;hi<gesture.hands.length;hi++){
            const h=gesture.hands[hi];
            const sm=handSmooth[hi];
            if(!h||!h.lm)continue;

            for(let ti=0;ti<TIPS.length;ti++){
                const lm=h.lm[TIPS[ti]];
                const targetX=mirrorX?(1-lm.x)*W:lm.x*W;
                const targetY=lm.y*H;

                if(sm.tips[ti].x===0&&sm.tips[ti].y===0){
                    sm.tips[ti].x=targetX;
                    sm.tips[ti].y=targetY;
                } else {
                    sm.tips[ti].x+=(targetX-sm.tips[ti].x)*TRACKING_SMOOTH_FACTOR;
                    sm.tips[ti].y+=(targetY-sm.tips[ti].y)*TRACKING_SMOOTH_FACTOR;
                }

                if(currentMode==='smear'&&activeWorld.pmXY){
                    var ndcX=(sm.tips[ti].x/W)*2-1;
                    var ndcY=-((sm.tips[ti].y/H)*2-1);
                    var halfH=Math.tan(75*Math.PI/360)*38;
                    activeWorld.pmXY(ndcX*halfH*(W/H), ndcY*halfH);
                } else {
                    const w=s2w(sm.tips[ti].x,sm.tips[ti].y);
                    if(w.hit)activeWorld.pm(w.x,w.z,1.2);
                }
            }
        }

        if(currentMode==='flow'||currentMode==='flow2'||currentMode==='smear'||currentMode==='vortex'){renderer.autoClearColor=false;fadeMat.color.setRGB(activeWorld.bg[0],activeWorld.bg[1],activeWorld.bg[2]);fadeMat.opacity=currentMode==='smear'?0.12:currentMode==='vortex'?0.06:0.1;renderer.render(fadeScene,orthoCamera);renderer.render(scene,camera)}
        else{renderer.autoClearColor=true;renderer.setClearAlpha(1);renderer.render(scene,camera)}
    }
    else if(currentCategory==='game'){
        gCtx.clearRect(0,0,W,H);
        if(Math.random()<(currentMode==='bubbles'?.03:.02))spawnEnt();
        for(let i=entities.length-1;i>=0;i--){let e=entities[i];e.y-=e.sy;
        if(currentMode==='bubbles'){e.w+=.05;e.x+=Math.sin(e.w)*.5+e.sx}
        gCtx.save();gCtx.translate(e.x,e.y);
        if(currentMode==='bubbles'){gCtx.beginPath();gCtx.arc(0,0,e.r,0,6.28);gCtx.fillStyle=e.color+'40';gCtx.fill();gCtx.strokeStyle=e.color;gCtx.lineWidth=2;gCtx.stroke()}
        else{gCtx.font=`${e.r*2}px Arial`;gCtx.textAlign='center';gCtx.textBaseline='middle';gCtx.fillText(e.emoji,0,0)}
        gCtx.restore();
        let hit=false;
        if(gesture.h1&&Math.hypot(gesture.h1.x*W-e.x,gesture.h1.y*H-e.y)<e.r+30)hit=true;
        if(gesture.h2&&Math.hypot(gesture.h2.x*W-e.x,gesture.h2.y*H-e.y)<e.r+30)hit=true;
        if(hit){splash(e.x,e.y,e.color,currentMode==='fruits');gameScore+=currentMode==='fruits'?15:1;scoreEl.innerText=gameScore;entities.splice(i,1)}
        else if(e.y+e.r<-100)entities.splice(i,1)}
        for(let i=particles2D.length-1;i>=0;i--){let p=particles2D[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.4;p.alpha-=.03;if(p.alpha<=0){particles2D.splice(i,1);continue}
        gCtx.beginPath();gCtx.arc(p.x,p.y,p.r,0,6.28);gCtx.fillStyle=p.isFruit?`${p.color}${p.alpha})`:p.color;gCtx.globalAlpha=p.isFruit?1:p.alpha;gCtx.fill();gCtx.globalAlpha=1}
    }

    drawHolo();
}

let activeStream=null,isProcessing=false,currentDeviceId=null,lastVideoTime=-1;

async function getCameras(){
    try{
        await navigator.mediaDevices.getUserMedia({video:true});
        const devs=await navigator.mediaDevices.enumerateDevices();
        const vids=devs.filter(d=>d.kind==='videoinput');
        camSelect.innerHTML='';
        vids.forEach((d,i)=>{const o=document.createElement('option');o.value=d.deviceId;o.text=d.label?.replace(/facing back/i,'Back').replace(/facing front/i,'Front')||`Camera ${i+1}`;camSelect.appendChild(o)});
        camSelect.addEventListener('change',()=>startCam(camSelect.value));
        if(vids.length>0){const fc=vids.find(d=>d.label?.toLowerCase().includes('front'));startCam(fc?fc.deviceId:vids[0].deviceId)}
    }catch(e){statusEl.textContent='Cam Error';statusEl.className='badge b-status error'}
}

async function startCam(deviceId){
    if(activeStream){activeStream.getTracks().forEach(t=>t.stop());videoElement.srcObject=null;await new Promise(r=>setTimeout(r,300))}
    currentDeviceId=deviceId;statusEl.textContent='Init…';statusEl.className='badge b-status loading';
    for(let i=0;i<camSelect.options.length;i++){if(camSelect.options[i].value===deviceId){camSelect.selectedIndex=i;break}}
    let cs={video:deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720}}:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}};
    try{activeStream=await navigator.mediaDevices.getUserMedia(cs)}catch(e){try{cs={video:{deviceId}};activeStream=await navigator.mediaDevices.getUserMedia(cs)}catch(e2){statusEl.textContent='CAM ERR';statusEl.className='badge b-status error';return}}
    videoElement.srcObject=activeStream;
    try{await videoElement.play();if(!isProcessing){isProcessing=true;processLoop()}}catch(e){statusEl.textContent='ERR';statusEl.className='badge b-status error'}
}

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.65,minTrackingConfidence:0.6});
hands.onResults(onResults);

async function processLoop(){
    if(!isProcessing)return;
    if(!videoElement.paused&&!videoElement.ended&&videoElement.readyState>=2){
        if(videoElement.currentTime!==lastVideoTime){
            lastVideoTime=videoElement.currentTime;
            if(camRotation===0){await hands.send({image:videoElement})}
            else{const vw=videoElement.videoWidth,vh=videoElement.videoHeight;
            if(vw&&vh){if(camRotation===90||camRotation===270){processCanvas.width=vh;processCanvas.height=vw}else{processCanvas.width=vw;processCanvas.height=vh}
            processCtx.save();processCtx.translate(processCanvas.width/2,processCanvas.height/2);processCtx.rotate(camRotation*Math.PI/180);processCtx.drawImage(videoElement,-vw/2,-vh/2,vw,vh);processCtx.restore();
            await hands.send({image:processCanvas})}}
        }
    }
    requestAnimationFrame(processLoop);
}

    var modal=document.createElement('div');
    modal.style.cssText='display:none;position:fixed;inset:0;z-index:10000;'+
        'background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);'+
        'align-items:center;justify-content:center;flex-direction:column;gap:12px;';
    modal.innerHTML=`
      <div style="background:#0a0a14;border:1px solid rgba(0,229,255,0.3);border-radius:12px;padding:22px 20px;width:min(320px,90vw);display:flex;flex-direction:column;gap:12px">
        <div style="font-family:Orbitron;font-size:11px;letter-spacing:3px;color:#00e5ff;text-transform:uppercase">WebSocket Relay</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7">Run <code style="color:#00e5ff;background:rgba(0,229,255,0.1);padding:1px 5px;border-radius:3px">node server.js</code> on your PC, then enter the IP shown in the terminal.</div>
        <input id="relay-input" type="text" placeholder="ws://192.168.x.x:8765"
          style="background:#050508;border:1px solid rgba(0,229,255,0.25);border-radius:7px;padding:9px 12px;color:#fff;font-family:JetBrains Mono,monospace;font-size:12px;outline:none;letter-spacing:.5px;width:100%">
        <div style="display:flex;gap:8px">
          <button id="relay-connect" style="flex:1;padding:9px;background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);border-radius:7px;color:#00e5ff;font-family:Orbitron;font-size:9px;letter-spacing:1.5px;cursor:pointer">CONNECT</button>
          <button id="relay-disconnect" style="padding:9px 14px;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:7px;color:#ff4444;font-family:Orbitron;font-size:9px;letter-spacing:1.5px;cursor:pointer">CLEAR</button>
          <button id="relay-cancel" style="padding:9px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:rgba(255,255,255,0.4);font-family:Orbitron;font-size:9px;cursor:pointer">✕</button>
        </div>
        <div id="relay-status" style="font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;min-height:14px"></div>
      </div>`;
    document.body.appendChild(modal);

    relayBtn.onclick=function(){
        modal.style.display='flex';
        if(wsUrl)document.getElementById('relay-input').value=wsUrl;
    };
    document.getElementById('relay-cancel').onclick=function(){modal.style.display='none';};
    document.getElementById('relay-connect').onclick=function(){
        var url=document.getElementById('relay-input').value.trim();
        if(!url)return;
        if(!url.startsWith('ws'))url='ws://'+url;
        if(!url.includes(':'))url+=':8765';
        localStorage.setItem('ironhand-relay',url);
        connectWS(url);
        modal.style.display='none';
    };
    document.getElementById('relay-disconnect').onclick=function(){
        localStorage.removeItem('ironhand-relay');
        if(ws){ws.onclose=null;ws.close();ws=null;}
        wsUrl=null;clearTimeout(wsReconnTimer);
        setRelayDot('off');
        document.getElementById('relay-input').value='';
        modal.style.display='none';
    };

    function setRelayDot(state){
        var dot=document.getElementById('relay-dot');
        if(!dot)return;
        var colors={off:'rgba(255,255,255,0.2)',connecting:'#fbbf24',on:'#50fa7b',error:'#ff4444'};
        dot.style.color=colors[state]||colors.off;
        relayBtn.style.borderColor=state==='on'?'rgba(80,250,123,0.4)':'rgba(0,229,255,0.25)';
        relayBtn.style.color=state==='on'?'#50fa7b':'rgba(0,229,255,0.5)';
    }

    function setRelayStatus(msg){
        var el=document.getElementById('relay-status');
        if(el)el.textContent=msg;
    }

    function connectWS(url){
        wsUrl=url;
        if(ws){ws.onclose=null;ws.close();}
        clearTimeout(wsReconnTimer);
        setRelayDot('connecting');
        try{
            ws=new WebSocket(url);
        }catch(e){setRelayDot('error');scheduleReconn();return;}

        ws.onopen=function(){
            setRelayDot('on');
            setRelayStatus('Connected to '+url);
            ws.send(JSON.stringify({type:'hello',role:'tracker'}));
            // Send state immediately so remotes get it on connect
            ws.send(JSON.stringify(getState()));
        };
        ws.onmessage=function(e){
            var d; try{d=JSON.parse(e.data);}catch{return;}
            // remote_connected: send full state immediately
            if(d.type==='remote_connected'){
                ws.send(JSON.stringify(getState()));
                return;
            }
            handleCmd(d);
        };
        ws.onclose=function(){
            setRelayDot('off');
            setRelayStatus('Disconnected — retrying…');
            scheduleReconn();
        };
        ws.onerror=function(){
            setRelayDot('error');
        };
    }

    function scheduleReconn(){
        if(!wsUrl)return;
        wsReconnTimer=setTimeout(()=>connectWS(wsUrl),3000);
    }
})();
</script>
</body>
</html>
