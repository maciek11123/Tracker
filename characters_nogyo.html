<body>
<canvas id="c"></canvas>
<button id="handBtn" title="Toggle Hand Tracking">✋</button>
<button id="muteBtn" title="Toggle Sound">🔊</button>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
// resize listener moved to after character init (handles canvas + position scaling)

// ===== HELPERS =====
function lerpColor(a, b, t) {
    const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
    const ra = (pa >> 16) & 255, ga = (pa >> 8) & 255, ba2 = pa & 255;
    const rb = (pb >> 16) & 255, gb = (pb >> 8) & 255, bb = pb & 255;
    const r = Math.round(ra + (rb - ra) * t), g = Math.round(ga + (gb - ga) * t), bv = Math.round(ba2 + (bb - ba2) * t);
    return `rgb(${r},${g},${bv})`;
}
function createLinGrad(ctx, x1, y1, x2, y2, stops) {
    const g = ctx.createLinearGradient(x1, y1, x2, y2);
    stops.forEach(s => g.addColorStop(s.o, s.c));
    return g;
}
function createRadGrad(ctx, cx, cy, r, stops) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    stops.forEach(s => g.addColorStop(s.o, s.c));
    return g;
}
function rand(a, b) { return a + Math.random() * (b - a); }

// ===== SOUND ENGINE (Web Audio API) =====
const SFX = (() => {
    let ctx = null, master = null, musicGain = null, sfxGain = null;
    let muted = false, started = false;
    let musicNodes = [];
    const pentatonic = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3];

    function init() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain();
        master.gain.value = 1;
        master.connect(ctx.destination);
        // SFX bus
        sfxGain = ctx.createGain();
        sfxGain.gain.value = 0.35;
        sfxGain.connect(master);
        // Music bus
        musicGain = ctx.createGain();
        musicGain.gain.value = 0;
        musicGain.connect(master);
    }

    function unlock() {
        if (started) return;
        init();
        if (ctx.state === 'suspended') ctx.resume();
        started = true;
        startMusic();
    }

    // --- Background Music: ambient pentatonic pad ---
    function startMusic() {
        // Warm pad: 2 detuned saws through a low-pass filter
        const padFreqs = [130.8, 196.0, 261.6]; // C3, G3, C4 chord
        padFreqs.forEach((f, i) => {
            const o1 = ctx.createOscillator();
            const o2 = ctx.createOscillator();
            o1.type = 'sine'; o2.type = 'triangle';
            o1.frequency.value = f; o2.frequency.value = f * 1.003;
            const g = ctx.createGain();
            g.gain.value = 0.06;
            const filt = ctx.createBiquadFilter();
            filt.type = 'lowpass'; filt.frequency.value = 400 + i * 80; filt.Q.value = 0.7;
            o1.connect(filt); o2.connect(filt); filt.connect(g); g.connect(musicGain);
            o1.start(); o2.start();
            musicNodes.push(o1, o2);
        });

        // Fade music in gently
        musicGain.gain.setTargetAtTime(0.55, ctx.currentTime, 3);

        // Random gentle melody plinks
        function schedulePlink() {
            if (muted || !started) { setTimeout(schedulePlink, 2000); return; }
            const delay = rand(2.5, 6.5);
            setTimeout(() => {
                if (!ctx || muted) { schedulePlink(); return; }
                const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
                const now = ctx.currentTime;
                const o = ctx.createOscillator();
                o.type = 'sine';
                o.frequency.value = freq;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(0.07, now + 0.05);
                g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                const filt = ctx.createBiquadFilter();
                filt.type = 'lowpass'; filt.frequency.value = 1200;
                o.connect(filt); filt.connect(g); g.connect(musicGain);
                o.start(now); o.stop(now + 2);
                schedulePlink();
            }, delay * 1000);
        }
        schedulePlink();

        // Subtle low rumble/warmth
        const noise = ctx.createBufferSource();
        const nBuf = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
        const nData = nBuf.getChannelData(0);
        for (let i = 0; i < nData.length; i++) nData[i] = (Math.random() * 2 - 1) * 0.3;
        noise.buffer = nBuf; noise.loop = true;
        const nFilt = ctx.createBiquadFilter();
        nFilt.type = 'lowpass'; nFilt.frequency.value = 120;
        const nGain = ctx.createGain();
        nGain.gain.value = 0.04;
        noise.connect(nFilt); nFilt.connect(nGain); nGain.connect(musicGain);
        noise.start();
        musicNodes.push(noise);
    }

    // --- Sound Effects ---

    function playTone(freq, dur, vol, type, attack, filterFreq) {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = type || 'sine';
        o.frequency.value = freq;
        const g = ctx.createGain();
        const atk = attack || 0.01;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(vol || 0.15, now + atk);
        g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        if (filterFreq) {
            const f = ctx.createBiquadFilter();
            f.type = 'lowpass'; f.frequency.value = filterFreq;
            o.connect(f); f.connect(g);
        } else {
            o.connect(g);
        }
        g.connect(sfxGain);
        o.start(now); o.stop(now + dur);
    }

    // Pick up: cheerful upward chirp
    function pickUp() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(350, now);
        o.frequency.exponentialRampToValueAtTime(900, now + 0.12);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.18, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.22);
        // soft pop click
        const click = ctx.createOscillator();
        click.type = 'square';
        click.frequency.value = 1200;
        const cg = ctx.createGain();
        cg.gain.setValueAtTime(0.06, now);
        cg.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        const cf = ctx.createBiquadFilter();
        cf.type = 'lowpass'; cf.frequency.value = 2000;
        click.connect(cf); cf.connect(cg); cg.connect(sfxGain);
        click.start(now); click.stop(now + 0.04);
    }

    // Drop: downward plop
    function drop() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(600, now);
        o.frequency.exponentialRampToValueAtTime(180, now + 0.15);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        o.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.32);
    }

    // Collision: soft wooden knock
    function bump() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'triangle';
        o.frequency.setValueAtTime(220 + Math.random() * 60, now);
        o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.1, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        const f = ctx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 800;
        o.connect(f); f.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.12);
    }

    // Wall bounce: muted thud
    function wallHit() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(150, now);
        o.frequency.exponentialRampToValueAtTime(60, now + 0.08);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.12, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.17);
    }

    // Sparkle: tiny bell chime
    function sparkle() {
        if (!ctx || muted) return;
        const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)] * 2;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.value = freq;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.04, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        o.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.45);
    }

    // Giggle: rapid playful notes
    function giggle() {
        if (!ctx || muted) return;
        const baseFreq = 500 + Math.random() * 200;
        for (let i = 0; i < 3; i++) {
            const now = ctx.currentTime + i * 0.07;
            const o = ctx.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(baseFreq + i * 80, now);
            o.frequency.exponentialRampToValueAtTime(baseFreq + i * 80 + 100, now + 0.04);
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.08, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            o.connect(g); g.connect(sfxGain);
            o.start(now); o.stop(now + 0.1);
        }
    }

    // Drag wobble: pitch-proportional to speed
    let lastDragSound = 0;
    function dragWobble(speed) {
        if (!ctx || muted) return;
        const now = performance.now();
        if (now - lastDragSound < 80) return;
        lastDragSound = now;
        const t = ctx.currentTime;
        const freq = 200 + speed * 30;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.value = Math.min(freq, 800);
        const g = ctx.createGain();
        g.gain.setValueAtTime(Math.min(speed * 0.008, 0.06), t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        const f = ctx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 1000;
        o.connect(f); f.connect(g); g.connect(sfxGain);
        o.start(t); o.stop(t + 0.1);
    }

    // Surprised: quick "oh!" sound
    function surprised() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(400, now);
        o.frequency.exponentialRampToValueAtTime(600, now + 0.05);
        o.frequency.exponentialRampToValueAtTime(500, now + 0.12);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.06, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        o.connect(g); g.connect(sfxGain);
        o.start(now); o.stop(now + 0.2);
    }

    function toggleMute() {
        muted = !muted;
        if (master) master.gain.setTargetAtTime(muted ? 0 : 1, ctx.currentTime, 0.1);
        return muted;
    }
    function isMuted() { return muted; }

    return { unlock, pickUp, drop, bump, wallHit, sparkle, giggle, dragWobble, surprised, toggleMute, isMuted };
})();

// ===== SPARKLE PARTICLES =====
let sparkles = [];
function spawnSparkles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        sparkles.push({
            x, y, vx: rand(-3, 3), vy: rand(-4, 1),
            life: rand(0.5, 1.2), maxLife: rand(0.5, 1.2),
            size: rand(2, 6), color: color || `hsl(${rand(30, 60)},100%,70%)`,
            type: Math.random() > 0.5 ? 'star' : 'circle'
        });
    }
}
function updateSparkles(dt) {
    for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.x += s.vx; s.y += s.vy; s.vy += 1.5 * dt;
        s.life -= dt;
        if (s.life <= 0) sparkles.splice(i, 1);
    }
}
function drawSparkles() {
    sparkles.forEach(s => {
        const a = Math.max(0, s.life / s.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = s.color;
        if (s.type === 'star') {
            drawMiniStar(s.x, s.y, s.size * a, 4);
        } else {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size * a, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    ctx.globalAlpha = 1;
}
function drawMiniStar(x, y, r, pts) {
    ctx.beginPath();
    for (let i = 0; i < pts * 2; i++) {
        const a = (i * Math.PI) / pts - Math.PI / 2;
        const cr = i % 2 === 0 ? r : r * 0.4;
        ctx.lineTo(x + Math.cos(a) * cr, y + Math.sin(a) * cr);
    }
    ctx.closePath();
    ctx.fill();
}

// ===== CHARACTER CLASS =====
class Character {
    constructor(def) {
        this.id = def.id;
        this.gx = def.gx; this.gy = def.gy;
        this.baseSize = def.sz;
        this.size = def.sz;
        this.type = def.type;
        this.colorDef = def.color;
        this.faceDef = JSON.parse(JSON.stringify(def.face || {}));
        this.accDef = def.acc || {};
        this.decoDef = def.deco || {};
        // Physics
        this.x = 0; this.y = 0;
        this.vx = 0; this.vy = 0;
        this.rotation = 0; this.vr = 0;
        this.scaleX = 1; this.scaleY = 1;
        this.targetScaleX = 1; this.targetScaleY = 1;
        // Interaction state
        this.dragging = false;
        this.dragOffX = 0; this.dragOffY = 0;
        this.emotion = 'idle'; // idle, surprised, giggle, laughing, happy
        this.emotionTimer = 0;
        this.blinkTimer = rand(2, 5);
        this.blinking = false;
        this.blinkDur = 0.15;
        this.blinkElapsed = 0;
        // Idle float
        this.floatPhase = rand(0, Math.PI * 2);
        this.floatAmpX = rand(1.5, 4);
        this.floatAmpY = rand(2, 5);
        this.floatSpeed = rand(0.4, 0.9);
        // Squish spring
        this.squishVX = 0; this.squishVY = 0;
        // Tracking
        this.zIndex = def.id;
        this.opacity = 0.88;
        // Nearby reaction
        this.reacting = false;
        this.reactTimer = 0;
    }

    init(W, H) {
        const gridW = 10, gridH = 5.5;
        const contentAR = gridW / gridH;
        const screenAR = W / H;
        let cw, ch, offX = 0, offY = 0;

        if (screenAR > contentAR) {
            // Screen wider than content (landscape / desktop mode)
            // → uniform cells fitted to height, center horizontally
            const cell = H / gridH;
            cw = cell; ch = cell;
            offX = (W - gridW * cell) / 2;
        } else {
            // Portrait or narrow: stretch to fill (original behavior)
            cw = W / gridW;
            ch = H / gridH;
        }

        this.x = this.gx * cw + cw * 0.3 + offX;
        this.y = this.gy * ch + ch * 0.3 + offY;

        // Scale size: original sizes designed for cw≈108 (1080px/10)
        // On portrait phones cw≈41 → keep original sizes (cap at 1.0)
        // On wider screens the uniform cell grows → scale up to fill
        const effectiveCell = Math.min(cw, ch);
        this.size = this.baseSize * Math.max(effectiveCell / 108, 1.0);
    }

    getRadius() { return this.size / 2; }

    containsPoint(px, py) {
        const r = this.size * 0.55;
        const dx = px - this.x, dy = py - this.y;
        return dx * dx + dy * dy < r * r;
    }

    update(dt, pointers, allChars) {
        const springK = 12;
        const springDamp = 0.6;

        // Squish spring physics
        const dsx = this.targetScaleX - this.scaleX;
        const dsy = this.targetScaleY - this.scaleY;
        this.squishVX += dsx * springK * dt;
        this.squishVY += dsy * springK * dt;
        this.squishVX *= (1 - springDamp * dt * 10);
        this.squishVY *= (1 - springDamp * dt * 10);
        this.scaleX += this.squishVX * dt;
        this.scaleY += this.squishVY * dt;

        // Emotion timer
        if (this.emotion === 'happy' || this.emotion === 'surprised') {
            this.emotionTimer -= dt;
            if (this.emotionTimer <= 0) this.emotion = 'idle';
        }
        if (this.reacting) {
            this.reactTimer -= dt;
            if (this.reactTimer <= 0) this.reacting = false;
        }

        // Blink cycle
        if (this.blinking) {
            this.blinkElapsed += dt;
            if (this.blinkElapsed >= this.blinkDur) {
                this.blinking = false;
                this.blinkTimer = rand(2, 6);
            }
        } else {
            this.blinkTimer -= dt;
            if (this.blinkTimer <= 0) {
                this.blinking = true;
                this.blinkElapsed = 0;
            }
        }

        if (!this.dragging) {
            // Friction
            this.vx *= 0.96;
            this.vy *= 0.96;
            this.vr *= 0.94;

            // Apply velocity
            this.x += this.vx;
            this.y += this.vy;
            this.rotation += this.vr;

            // Idle float
            if (Math.abs(this.vx) < 0.5 && Math.abs(this.vy) < 0.5) {
                const t = performance.now() / 1000;
                this.x += Math.sin(t * this.floatSpeed + this.floatPhase) * this.floatAmpX * dt;
                this.y += Math.cos(t * this.floatSpeed * 0.7 + this.floatPhase) * this.floatAmpY * dt;
            }

            // Wall bounce
            const r = this.getRadius();
            const wallBounce = 0.5;
            if (this.x - r < 0) { this.x = r; this.vx = Math.abs(this.vx) * wallBounce; this.targetScaleX = 0.85; this.targetScaleY = 1.1; if (Math.abs(this.vx) > 1) SFX.wallHit(); }
            if (this.x + r > W) { this.x = W - r; this.vx = -Math.abs(this.vx) * wallBounce; this.targetScaleX = 0.85; this.targetScaleY = 1.1; if (Math.abs(this.vx) > 1) SFX.wallHit(); }
            if (this.y - r < 0) { this.y = r; this.vy = Math.abs(this.vy) * wallBounce; this.targetScaleY = 0.85; this.targetScaleX = 1.1; if (Math.abs(this.vy) > 1) SFX.wallHit(); }
            if (this.y + r > H) { this.y = H - r; this.vy = -Math.abs(this.vy) * wallBounce; this.targetScaleY = 0.85; this.targetScaleX = 1.1; if (Math.abs(this.vy) > 1) SFX.wallHit(); }

            // Reset target scale toward 1
            this.targetScaleX += (1 - this.targetScaleX) * 3 * dt;
            this.targetScaleY += (1 - this.targetScaleY) * 3 * dt;
        }

        // Character separation (soft collision)
        for (const other of allChars) {
            if (other.id === this.id) continue;
            const dx = this.x - other.x, dy = this.y - other.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = (this.getRadius() + other.getRadius()) * 0.8;
            if (dist < minDist && dist > 0.1) {
                const overlap = minDist - dist;
                const nx = dx / dist, ny = dy / dist;
                const push = overlap * 0.3;
                if (!this.dragging) { this.x += nx * push; this.y += ny * push; }
                if (!other.dragging) { other.x -= nx * push; other.y -= ny * push; }
                // Collision squish
                if (Math.abs(this.vx) + Math.abs(this.vy) > 2) {
                    this.targetScaleX = 0.9; this.targetScaleY = 1.1;
                    other.targetScaleX = 0.9; other.targetScaleY = 1.1;
                    SFX.bump();
                }
            }
        }
    }

    draw(ctx, pointers) {
        const s = this.size;
        const r = s / 2;
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(this.scaleX, this.scaleY);

        // Apply fill color
        this.applyColor(ctx, r);

        // Draw shape
        this.drawShape(ctx, r);

        // Draw pattern/decoration overlay
        this.drawDecoration(ctx, r);

        // Draw accessories (below face)
        this.drawAccessoriesBelow(ctx, r);

        // Draw face
        this.drawFace(ctx, r, pointers);

        // Draw accessories (above face: beret, hair)
        this.drawAccessoriesAbove(ctx, r);

        ctx.restore();
    }

    applyColor(ctx, r) {
        const cd = this.colorDef;
        if (cd.t === 'solid') {
            ctx.fillStyle = cd.c;
        } else if (cd.t === 'linear') {
            ctx.fillStyle = createLinGrad(ctx, -r, -r, r, r, cd.stops);
        } else if (cd.t === 'conic') {
            // Simulate conic/rainbow with radial gradient
            if (cd.c === 'rainbow' || cd.c === 'rainbow-pastel') {
                const pastel = cd.c === 'rainbow-pastel';
                const g = ctx.createLinearGradient(-r, -r, r, r);
                if (pastel) {
                    g.addColorStop(0, '#ffb3ba'); g.addColorStop(0.2, '#bae1ff');
                    g.addColorStop(0.4, '#baffc9'); g.addColorStop(0.6, '#ffffba');
                    g.addColorStop(0.8, '#e8baff'); g.addColorStop(1, '#ffb3ba');
                } else {
                    g.addColorStop(0, '#ff6b6b'); g.addColorStop(0.17, '#ffd93d');
                    g.addColorStop(0.33, '#6bcb77'); g.addColorStop(0.5, '#4d96ff');
                    g.addColorStop(0.67, '#9b59b6'); g.addColorStop(0.83, '#ff6b9d');
                    g.addColorStop(1, '#ff6b6b');
                }
                ctx.fillStyle = g;
            }
        } else if (cd.t === 'split') {
            ctx.fillStyle = cd.c1; // Will handle split in drawShape
        }
    }

    drawShape(ctx, r) {
        const type = this.type;
        ctx.beginPath();
        switch (type) {
            case 'circle':
                if (this.colorDef.t === 'split') {
                    // Left half
                    ctx.save(); ctx.beginPath(); ctx.rect(-r * 1.5, -r * 1.5, r * 1.5, r * 3); ctx.clip();
                    ctx.fillStyle = this.colorDef.c1; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    // Right half
                    ctx.save(); ctx.beginPath(); ctx.rect(0, -r * 1.5, r * 1.5, r * 3); ctx.clip();
                    ctx.fillStyle = this.colorDef.c2; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    return;
                }
                ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                break;
            case 'trapezoid':
                ctx.moveTo(-r * 0.65, -r); ctx.lineTo(r * 0.65, -r);
                ctx.lineTo(r * 1.1, r); ctx.lineTo(-r * 1.1, r);
                ctx.closePath(); ctx.fill();
                break;
            case 'cloud':
                ctx.moveTo(-r, r * 0.4);
                ctx.arc(-r * 0.55, -r * 0.05, r * 0.5, Math.PI, Math.PI * 1.5);
                ctx.arc(0, -r * 0.35, r * 0.55, Math.PI * 1.2, Math.PI * 1.85);
                ctx.arc(r * 0.55, -r * 0.05, r * 0.5, Math.PI * 1.5, Math.PI * 2);
                ctx.lineTo(r, r * 0.4); ctx.closePath(); ctx.fill();
                break;
            case 'blossom':
                ctx.save();
                for (let i = 0; i < 8; i++) {
                    ctx.save(); ctx.rotate(i * Math.PI / 4);
                    ctx.beginPath(); ctx.arc(0, -r * 0.65, r * 0.38, 0, Math.PI * 2);
                    ctx.fill(); ctx.restore();
                }
                ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                return;
            case 'split-flower':
                // Left half teal
                ctx.save(); ctx.beginPath(); ctx.rect(-r * 1.5, -r * 1.5, r * 1.5, r * 3); ctx.clip();
                ctx.fillStyle = '#2ba89c';
                for (let i = 0; i < 8; i++) {
                    ctx.save(); ctx.rotate(i * Math.PI / 4);
                    ctx.beginPath(); ctx.arc(0, -r * 0.65, r * 0.38, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                // Right half pink
                ctx.save(); ctx.beginPath(); ctx.rect(0, -r * 1.5, r * 1.5, r * 3); ctx.clip();
                ctx.fillStyle = '#f689a7';
                for (let i = 0; i < 8; i++) {
                    ctx.save(); ctx.rotate(i * Math.PI / 4);
                    ctx.beginPath(); ctx.arc(0, -r * 0.65, r * 0.38, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                return;
            case 'hexagon':
                for (let i = 0; i < 6; i++) {
                    const a = i * Math.PI / 3 - Math.PI / 6;
                    ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                }
                ctx.closePath(); ctx.fill();
                break;
            case 'star-multi':
                const pts = this.decoDef.points || 8;
                const ir = r * 0.55;
                for (let i = 0; i < pts * 2; i++) {
                    const a = (i * Math.PI) / pts - Math.PI / 2;
                    const cr = i % 2 === 0 ? r : ir;
                    ctx.lineTo(cr * Math.cos(a), cr * Math.sin(a));
                }
                ctx.closePath(); ctx.fill();
                break;
            case 'triangle':
                ctx.moveTo(0, -r); ctx.lineTo(r, r); ctx.lineTo(-r, r);
                ctx.closePath(); ctx.fill();
                break;
            case 'oval':
                ctx.ellipse(0, 0, r * 0.65, r, 0, 0, Math.PI * 2); ctx.fill();
                break;
            case 'crown':
                ctx.moveTo(-r, r); ctx.lineTo(-r, -r * 0.2);
                ctx.lineTo(-r * 0.5, r * 0.3); ctx.lineTo(0, -r);
                ctx.lineTo(r * 0.5, r * 0.3); ctx.lineTo(r, -r * 0.2);
                ctx.lineTo(r, r); ctx.closePath(); ctx.fill();
                break;
            case 'l-shape':
                ctx.moveTo(-r, -r); ctx.lineTo(0, -r); ctx.lineTo(0, 0);
                ctx.lineTo(r, 0); ctx.lineTo(r, r); ctx.lineTo(-r, r);
                ctx.closePath(); ctx.fill();
                break;
            case 'cactus':
                // Body
                ctx.beginPath();
                ctx.roundRect(-r * 0.28, -r * 0.9, r * 0.56, r * 1.8, r * 0.2);
                ctx.fill();
                // Left arm
                ctx.beginPath();
                ctx.roundRect(-r * 0.75, -r * 0.6, r * 0.28, r * 0.65, r * 0.12);
                ctx.fill();
                ctx.beginPath();
                ctx.roundRect(-r * 0.75, -r * 0.2, r * 0.55, r * 0.28, r * 0.12);
                ctx.fill();
                // Right arm
                ctx.beginPath();
                ctx.roundRect(r * 0.48, -r * 0.35, r * 0.28, r * 0.55, r * 0.12);
                ctx.fill();
                ctx.beginPath();
                ctx.roundRect(r * 0.2, r * 0, r * 0.55, r * 0.28, r * 0.12);
                ctx.fill();
                return;
            case 'egg':
                ctx.ellipse(0, r * 0.05, r * 0.72, r * 0.92, 0, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'zigzag-rect':
                // Main body
                ctx.rect(-r * 0.9, -r * 0.5, r * 1.8, r * 1.2); ctx.fill();
                // Top zigzag
                ctx.beginPath();
                const zSteps = 7;
                const zW = (r * 1.8) / zSteps;
                ctx.moveTo(-r * 0.9, -r * 0.5);
                for (let s = 0; s <= zSteps; s++) {
                    ctx.lineTo(-r * 0.9 + s * zW, -r * 0.5 - (s % 2 === 0 ? 0 : r * 0.25));
                }
                ctx.lineTo(r * 0.9, -r * 0.5); ctx.closePath(); ctx.fill();
                break;
            case 'square':
                ctx.roundRect(-r * 0.9, -r * 0.9, r * 1.8, r * 1.8, r * 0.12);
                ctx.fill();
                break;
            case 'bean':
                ctx.ellipse(r * 0.05, -r * 0.15, r * 0.45, r * 0.7, -Math.PI / 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-r * 0.1, r * 0.35, r * 0.38, r * 0.45, Math.PI / 5, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'lips':
                ctx.ellipse(0, 0, r, r * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'star-5':
                for (let i = 0; i < 5; i++) {
                    const a1 = (18 + i * 72) * Math.PI / 180;
                    const a2 = (54 + i * 72) * Math.PI / 180;
                    ctx.lineTo(Math.cos(a1) * r, -Math.sin(a1) * r);
                    ctx.lineTo(Math.cos(a2) * r * 0.42, -Math.sin(a2) * r * 0.42);
                }
                ctx.closePath(); ctx.fill();
                break;
            case 'semicircle':
                ctx.arc(0, r * 0.15, r, Math.PI, 0, false);
                ctx.closePath(); ctx.fill();
                break;
            case 'crescent':
                ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2, false);
                ctx.arc(r * 0.35, 0, r * 0.85, Math.PI / 2, -Math.PI / 2, true);
                ctx.closePath(); ctx.fill();
                break;
        }
    }

    drawDecoration(ctx, r) {
        const d = this.decoDef;
        if (!d.pattern) return;
        ctx.save();
        // Re-create clip path
        ctx.beginPath();
        this.clipShape(ctx, r);
        ctx.clip();

        if (d.pattern === 'stripes') {
            ctx.strokeStyle = d.patternColor || 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            for (let i = -r * 2; i < r * 2; i += 14) {
                ctx.moveTo(i, -r * 1.5); ctx.lineTo(i + r * 1.5, r * 1.5);
            }
            ctx.stroke();
        } else if (d.pattern === 'dots') {
            ctx.fillStyle = d.patternColor || 'rgba(0,0,0,0.12)';
            for (let x = -r * 1.5; x < r * 1.5; x += 12) {
                for (let y = -r * 1.5; y < r * 1.5; y += 12) {
                    ctx.beginPath();
                    ctx.arc(x + (Math.floor(y / 12) % 2 ? 6 : 0), y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        } else if (d.pattern === 'vertical-lines') {
            ctx.strokeStyle = d.patternColor || 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = -r * 1.5; i <= r * 1.5; i += 12) {
                ctx.moveTo(i, -r * 1.5); ctx.lineTo(i, r * 1.5);
            }
            ctx.stroke();
        } else if (d.pattern === 'noise') {
            // Subtle noise texture
            ctx.fillStyle = d.patternColor || 'rgba(0,0,0,0.06)';
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.arc(rand(-r, r), rand(-r, r), rand(1, 3), 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }

    clipShape(ctx, r) {
        switch (this.type) {
            case 'circle': ctx.arc(0, 0, r, 0, Math.PI * 2); break;
            case 'trapezoid':
                ctx.moveTo(-r * 0.65, -r); ctx.lineTo(r * 0.65, -r);
                ctx.lineTo(r * 1.1, r); ctx.lineTo(-r * 1.1, r); ctx.closePath(); break;
            case 'hexagon':
                for (let i = 0; i < 6; i++) { const a = i * Math.PI / 3 - Math.PI / 6; ctx.lineTo(r * Math.cos(a), r * Math.sin(a)); }
                ctx.closePath(); break;
            case 'egg': ctx.ellipse(0, r * 0.05, r * 0.72, r * 0.92, 0, 0, Math.PI * 2); break;
            case 'oval': ctx.ellipse(0, 0, r * 0.65, r, 0, 0, Math.PI * 2); break;
            case 'square': ctx.roundRect(-r * 0.9, -r * 0.9, r * 1.8, r * 1.8, r * 0.12); break;
            case 'triangle': ctx.moveTo(0, -r); ctx.lineTo(r, r); ctx.lineTo(-r, r); ctx.closePath(); break;
            case 'star-5':
                for (let i = 0; i < 5; i++) {
                    const a1 = (18 + i * 72) * Math.PI / 180, a2 = (54 + i * 72) * Math.PI / 180;
                    ctx.lineTo(Math.cos(a1) * r, -Math.sin(a1) * r);
                    ctx.lineTo(Math.cos(a2) * r * 0.42, -Math.sin(a2) * r * 0.42);
                } ctx.closePath(); break;
            case 'semicircle': ctx.arc(0, r * 0.15, r, Math.PI, 0, false); ctx.closePath(); break;
            case 'crescent':
                ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2, false);
                ctx.arc(r * 0.35, 0, r * 0.85, Math.PI / 2, -Math.PI / 2, true); ctx.closePath(); break;
            default: ctx.arc(0, 0, r, 0, Math.PI * 2); break;
        }
    }

    drawFace(ctx, r, pointers) {
        const f = this.faceDef;
        if (!f.eyes) return;

        ctx.fillStyle = '#000';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;

        // Find nearest pointer for pupil tracking
        let nearestPx = 0, nearestPy = 0, nearestDist = Infinity;
        for (const p of pointers) {
            // Transform pointer to local space
            const lx = (p.x - this.x) / this.scaleX;
            const ly = (p.y - this.y) / this.scaleY;
            const d = lx * lx + ly * ly;
            if (d < nearestDist) { nearestDist = d; nearestPx = lx; nearestPy = ly; }
        }

        // Determine current mouth based on emotion
        const emotionMouth = this.getEmotionMouth();

        // Draw eyes
        f.eyes.forEach(eye => {
            ctx.save();
            const ex = eye.x, ey = eye.y;
            const eR = eye.r || 5;

            // Blinking override
            if (this.blinking && eye.t !== 'sleeping' && eye.t !== 'line') {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(ex - eR, ey); ctx.lineTo(ex + eR, ey);
                ctx.stroke();
                ctx.restore();
                return;
            }

            if (eye.t === 'dot') {
                ctx.beginPath();
                ctx.arc(ex, ey, eR, 0, Math.PI * 2);
                ctx.fill();
            } else if (eye.t === 'circle-white') {
                // White sclera
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(ex, ey, eR, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
                ctx.stroke();
                // Pupil tracking
                const pupilR = eR * 0.4;
                const maxOffset = eR * 0.35;
                let dx = nearestPx - ex, dy = nearestPy - ey;
                const dm = Math.sqrt(dx * dx + dy * dy);
                if (dm > 0) { dx = (dx / dm) * Math.min(dm * 0.1, maxOffset); dy = (dy / dm) * Math.min(dm * 0.1, maxOffset); }
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(ex + dx, ey + dy, pupilR, 0, Math.PI * 2);
                ctx.fill();
            } else if (eye.t === 'sleeping') {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(ex, ey, eR, 0, Math.PI, false);
                ctx.stroke();
                if (eye.lashes) {
                    ctx.beginPath();
                    for (let a = 0; a <= Math.PI; a += Math.PI / 4) {
                        ctx.moveTo(ex + Math.cos(a) * eR, ey + Math.sin(a) * eR);
                        ctx.lineTo(ex + Math.cos(a) * (eR + 4), ey + Math.sin(a) * (eR + 4));
                    }
                    ctx.stroke();
                }
            } else if (eye.t === 'line') {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(ex - 7, ey); ctx.lineTo(ex + 7, ey);
                ctx.stroke();
            } else if (eye.t === 'sad') {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(ex, ey + 3, eR, Math.PI, 0, false);
                ctx.stroke();
            }
            ctx.restore();
        });

        // Draw emotion blush
        if (this.emotion === 'happy' || this.emotion === 'giggle' || this.emotion === 'laughing') {
            ctx.fillStyle = 'rgba(240, 120, 160, 0.45)';
            ctx.beginPath(); ctx.arc(-r * 0.4, r * 0.15, r * 0.12, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(r * 0.4, r * 0.15, r * 0.12, 0, Math.PI * 2); ctx.fill();
        }

        // Draw defined blush
        if (f.blush) {
            ctx.fillStyle = 'rgba(240, 98, 146, 0.5)';
            f.blush.forEach(bl => {
                ctx.beginPath(); ctx.arc(bl.x, bl.y, bl.r || 7, 0, Math.PI * 2); ctx.fill();
            });
        }

        // Draw sweat
        if (f.sweat) {
            ctx.fillStyle = '#90caf9';
            f.sweat.forEach(sw => {
                ctx.beginPath();
                ctx.moveTo(sw.x, sw.y);
                ctx.quadraticCurveTo(sw.x - 3, sw.y + 7, sw.x, sw.y + 10);
                ctx.quadraticCurveTo(sw.x + 3, sw.y + 7, sw.x, sw.y);
                ctx.fill();
            });
        }

        // Draw mouth (emotion-aware)
        this.drawMouth(ctx, emotionMouth);
    }

    getEmotionMouth() {
        const m = this.faceDef.mouth;
        if (!m) return null;
        switch (this.emotion) {
            case 'surprised': return { ...m, t: 'circle', x: m.x, y: m.y, r: 8 };
            case 'giggle': return { ...m, t: 'happy-wide', x: m.x, y: m.y, r: (m.r || 12) * 0.8 };
            case 'laughing': return { ...m, t: 'big-open', x: m.x, y: m.y, r: (m.r || 12) * 1.2 };
            case 'happy': return { ...m, t: 'happy', x: m.x, y: m.y, r: m.r || 12 };
            default: return m; // idle: use original
        }
    }

    drawMouth(ctx, m) {
        if (!m) return;
        ctx.save();
        ctx.strokeStyle = '#000'; ctx.fillStyle = '#000'; ctx.lineWidth = 3.5;

        const t = m.t || m.type;
        const mx = m.x, my = m.y, mr = m.r || 12;

        switch (t) {
            case 'sad':
                ctx.beginPath();
                ctx.arc(mx, my + 8, mr, Math.PI * 1.15, Math.PI * 1.85, true);
                ctx.stroke();
                break;
            case 'happy':
                ctx.beginPath();
                ctx.arc(mx, my - 3, mr, 0.1, Math.PI - 0.1, false);
                ctx.stroke();
                break;
            case 'happy-wide':
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(mx, my - 5, mr, 0, Math.PI, false);
                ctx.stroke();
                // Tongue hint
                ctx.fillStyle = '#e57373';
                ctx.beginPath();
                ctx.arc(mx, my + mr * 0.2, mr * 0.35, 0, Math.PI, false);
                ctx.fill();
                break;
            case 'big-open':
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.ellipse(mx, my, mr * 0.8, mr * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                // Tongue
                ctx.fillStyle = '#e57373';
                ctx.beginPath();
                ctx.arc(mx, my + mr * 0.3, mr * 0.4, 0, Math.PI, false);
                ctx.fill();
                break;
            case 'line':
                ctx.beginPath();
                ctx.moveTo(mx - (m.w || 10), my);
                ctx.lineTo(mx + (m.w || 10), my);
                ctx.stroke();
                break;
            case 'circle':
                ctx.beginPath();
                ctx.arc(mx, my, mr, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'big-smile':
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(mx, my - 6, mr, 0, Math.PI, false);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let dl = -mr * 0.6; dl <= mr * 0.6; dl += 5) {
                    ctx.moveTo(mx + dl, my - 6); ctx.lineTo(mx + dl, my + 3);
                }
                ctx.stroke();
                break;
            case 'red-lips':
                ctx.fillStyle = '#d32f2f';
                ctx.beginPath();
                ctx.ellipse(mx, my, 18, 9, 0, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.fillRect(mx - 10, my - 2, 20, 4);
                ctx.strokeRect(mx - 10, my - 2, 20, 4);
                break;
            case 'mustache':
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(mx - 8, my - 2, 9, 5, -0.2, Math.PI, 0, false);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(mx + 8, my - 2, 9, 5, 0.2, Math.PI, 0, false);
                ctx.fill();
                break;
        }
        ctx.restore();
    }

    drawAccessoriesBelow(ctx, r) {
        const acc = this.accDef;
        // Nose
        if (acc.nose) {
            ctx.save();
            ctx.fillStyle = acc.nose.color;
            if (acc.nose.type === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(0, -2); ctx.lineTo(-8, 10); ctx.lineTo(8, 10);
                ctx.closePath(); ctx.fill();
            } else if (acc.nose.type === 'round') {
                ctx.beginPath();
                ctx.arc(0, 4, 8, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    drawAccessoriesAbove(ctx, r) {
        const acc = this.accDef;
        // Glasses
        if (acc.glasses) {
            ctx.save();
            const gc = acc.glasses.color;
            ctx.strokeStyle = gc; ctx.lineWidth = 3; ctx.fillStyle = 'transparent';
            const style = acc.glasses.style;
            if (style === 'round') {
                ctx.beginPath(); ctx.arc(-12, -4, 10, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.arc(12, -4, 10, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-2, -4); ctx.lineTo(2, -4); ctx.stroke();
                // Temples
                ctx.beginPath(); ctx.moveTo(-22, -4); ctx.lineTo(-r * 0.7, -6); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(22, -4); ctx.lineTo(r * 0.7, -6); ctx.stroke();
            } else if (style === 'cat') {
                ctx.beginPath();
                ctx.ellipse(-12, -2, 12, 9, 0, 0, Math.PI * 2); ctx.stroke();
                // Cat-eye corners
                ctx.beginPath(); ctx.moveTo(-24, -8); ctx.lineTo(-22, -12); ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(12, -2, 12, 9, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(24, -8); ctx.lineTo(22, -12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-0, -2); ctx.lineTo(0, -2); ctx.stroke();
            } else if (style === 'square') {
                ctx.strokeRect(-22, -12, 18, 14);
                ctx.strokeRect(4, -12, 18, 14);
                ctx.beginPath(); ctx.moveTo(-4, -5); ctx.lineTo(4, -5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-22, -5); ctx.lineTo(-r * 0.7, -7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(22, -5); ctx.lineTo(r * 0.7, -7); ctx.stroke();
            } else if (style === 'sunglasses') {
                ctx.fillStyle = gc;
                ctx.beginPath(); ctx.ellipse(-11, -3, 13, 10, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(11, -3, 13, 10, 0, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = gc; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-1, -3); ctx.lineTo(1, -3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-24, -5); ctx.lineTo(-r * 0.7, -7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(24, -5); ctx.lineTo(r * 0.7, -7); ctx.stroke();
            }
            ctx.restore();
        }
        // Beret
        if (acc.beret) {
            ctx.save();
            ctx.fillStyle = acc.beret.color;
            ctx.beginPath();
            ctx.ellipse(0, -r * 0.85, r * 0.55, r * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-r * 0.15, -r * 0.9, r * 0.32, 0, Math.PI * 2);
            ctx.fill();
            // Nub
            ctx.beginPath();
            ctx.arc(-r * 0.15, -r * 1.15, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        // Hair
        if (acc.hair) {
            ctx.save();
            ctx.fillStyle = acc.hair.color;
            if (acc.hair.style === 'bob') {
                ctx.beginPath();
                ctx.arc(0, -r * 0.3, r * 0.85, Math.PI * 1.1, Math.PI * 1.9, false);
                ctx.quadraticCurveTo(r * 0.6, -r * 0.6, r * 0.5, -r * 0.1);
                ctx.quadraticCurveTo(r * 0.3, -r * 0.5, 0, -r * 0.5);
                ctx.quadraticCurveTo(-r * 0.3, -r * 0.5, -r * 0.5, -r * 0.1);
                ctx.fill();
            }
            ctx.restore();
        }
    }
}

// ===== CREATE CHARACTERS =====
let chars = CHAR_DEFS.map(d => new Character(d));

function initPositions() {
    chars.forEach(c => c.init(W, H));
}
initPositions();

// On resize: scale positions proportionally instead of snapping to grid
window.addEventListener('resize', () => {
    const oldW = W, oldH = H;
    resize();
    if (oldW > 0 && oldH > 0) {
        const sx = W / oldW, sy = H / oldH;
        chars.forEach(c => {
            c.x *= sx; c.y *= sy;
            // Recalculate size for new screen
            const gridW = 10, gridH = 5.5;
            const screenAR = W / H, contentAR = gridW / gridH;
            let cw, ch;
            if (screenAR > contentAR) {
                const cell = H / gridH; cw = cell; ch = cell;
            } else {
                cw = W / gridW; ch = H / gridH;
            }
            const effectiveCell = Math.min(cw, ch);
            c.size = c.baseSize * Math.max(effectiveCell / 108, 1.0);
        });
    }
});

// ===== INPUT HANDLING =====
let pointers = new Map(); // id -> {x, y, prevX, prevY, char: Character|null}
let globalPointerList = []; // for pupil tracking

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findCharAt(x, y) {
    // Search from top z-index
    const sorted = [...chars].sort((a, b) => b.zIndex - a.zIndex);
    for (const c of sorted) {
        if (c.containsPoint(x, y)) return c;
    }
    return null;
}

function onPointerDown(id, x, y) {
    SFX.unlock();
    const ch = findCharAt(x, y);
    pointers.set(id, { x, y, prevX: x, prevY: y, char: ch, startTime: performance.now() });
    if (ch) {
        ch.dragging = true;
        ch.dragOffX = ch.x - x;
        ch.dragOffY = ch.y - y;
        ch.vx = 0; ch.vy = 0; ch.vr = 0;
        ch.emotion = 'surprised';
        ch.emotionTimer = 0.8;
        ch.targetScaleX = 1.15; ch.targetScaleY = 0.88;
        // Bring to front
        const maxZ = Math.max(...chars.map(c => c.zIndex));
        ch.zIndex = maxZ + 1;
        spawnSparkles(x, y, 8, `hsl(${rand(30, 60)},100%,70%)`);
        SFX.pickUp();
    }
}

function onPointerMove(id, x, y) {
    const p = pointers.get(id);
    if (!p) return;
    p.prevX = p.x; p.prevY = p.y;
    p.x = x; p.y = y;

    if (p.char && p.char.dragging) {
        const ch = p.char;
        const dx = x - p.prevX, dy = y - p.prevY;
        const speed = Math.sqrt(dx * dx + dy * dy);
        ch.x = x + ch.dragOffX;
        ch.y = y + ch.dragOffY;
        ch.vx = dx * 0.6; ch.vy = dy * 0.6;
        ch.vr = dx * 0.003;

        // Squish based on drag direction
        ch.targetScaleX = 1 + Math.abs(dx) * 0.008;
        ch.targetScaleY = 1 + Math.abs(dy) * 0.008;

        // Emotion based on speed
        if (speed > 8) {
            ch.emotion = 'laughing'; ch.emotionTimer = 0.5;
            if (Math.random() < 0.3) spawnSparkles(ch.x, ch.y, 3, `hsl(${rand(0, 360)},90%,70%)`);
            if (Math.random() < 0.2) SFX.giggle();
        } else if (speed > 2) {
            ch.emotion = 'giggle'; ch.emotionTimer = 0.5;
        }
        if (speed > 1) SFX.dragWobble(speed);

        // Nearby character reactions
        chars.forEach(other => {
            if (other.id === ch.id) return;
            const odx = ch.x - other.x, ody = ch.y - other.y;
            const od = Math.sqrt(odx * odx + ody * ody);
            if (od < (ch.getRadius() + other.getRadius()) * 1.5) {
                if (!other.reacting) {
                    other.reacting = true;
                    other.reactTimer = 0.6;
                    other.emotion = 'surprised';
                    other.emotionTimer = 0.6;
                    SFX.surprised();
                }
            }
        });
    }
}

function onPointerUp(id) {
    const p = pointers.get(id);
    if (p && p.char) {
        const ch = p.char;
        ch.dragging = false;
        ch.emotion = 'happy';
        ch.emotionTimer = 1.5;
        ch.targetScaleX = 0.9; ch.targetScaleY = 1.12;
        // Fling
        ch.vx *= 1.5; ch.vy *= 1.5;
        spawnSparkles(ch.x, ch.y, 12, `hsl(${rand(30, 60)},100%,75%)`);
        SFX.drop();
        SFX.sparkle();
    }
    pointers.delete(id);
}

// Touch events
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const pos = getPointerPos(t);
        onPointerDown(t.identifier, pos.x, pos.y);
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const pos = getPointerPos(t);
        onPointerMove(t.identifier, pos.x, pos.y);
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) onPointerUp(t.identifier);
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
    for (const t of e.changedTouches) onPointerUp(t.identifier);
});

// Mouse events
let mouseDown = false;
canvas.addEventListener('mousedown', e => {
    mouseDown = true;
    const pos = getPointerPos(e);
    onPointerDown('mouse', pos.x, pos.y);
});
canvas.addEventListener('mousemove', e => {
    const pos = getPointerPos(e);
    if (mouseDown) onPointerMove('mouse', pos.x, pos.y);
    // Update global pointer for pupil tracking
    globalPointerList = [pos];
});
canvas.addEventListener('mouseup', () => { mouseDown = false; onPointerUp('mouse'); });
canvas.addEventListener('mouseleave', () => { if (mouseDown) { mouseDown = false; onPointerUp('mouse'); } });

// ===== MEDIAPIPE HANDS =====
let handTrackingActive = false;
let handPoints = []; // [{x,y}] fingertip positions
let handModel = null;
let videoEl = document.getElementById('webcam');
let handAnimId = null;

const handBtn = document.getElementById('handBtn');
const webcamWrap = document.getElementById('webcamWrap');

handBtn.addEventListener('click', async () => {
    if (handTrackingActive) {
        handTrackingActive = false;
        handBtn.classList.remove('active');
        webcamWrap.style.display = 'none';
        handPoints = [];
        if (videoEl.srcObject) { videoEl.srcObject.getTracks().forEach(t => t.stop()); videoEl.srcObject = null; }
        return;
    }
    // Load MediaPipe
    handBtn.textContent = '⏳';
    try {
        // Dynamic import
        if (!window.Hands) {
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js');
        }
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } });
        videoEl.srcObject = stream;
        webcamWrap.style.display = 'block';

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults(results => {
            handPoints = [];
            if (results.multiHandLandmarks) {
                // Fingertip indices: 4,8,12,16,20
                const tips = [4, 8, 12, 16, 20];
                results.multiHandLandmarks.forEach(lm => {
                    tips.forEach(ti => {
                        const pt = lm[ti];
                        // Mirror and scale to canvas
                        handPoints.push({ x: (1 - pt.x) * W, y: pt.y * H });
                    });
                });
            }
            // Hand interaction: tickle/push nearby characters
            handPoints.forEach(hp => {
                chars.forEach(ch => {
                    if (ch.dragging) return;
                    const dx = hp.x - ch.x, dy = hp.y - ch.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const touchR = ch.getRadius() * 1.2;
                    if (dist < touchR) {
                        // Tickle
                        ch.emotion = 'giggle';
                        ch.emotionTimer = 0.4;
                        ch.targetScaleX = 1.05 + Math.random() * 0.05;
                        ch.targetScaleY = 0.95 + Math.random() * 0.05;
                        // Push away
                        if (dist > 0.1) {
                            const nx = -dx / dist, ny = -dy / dist;
                            ch.vx += nx * 2; ch.vy += ny * 2;
                        }
                        if (Math.random() < 0.15) { spawnSparkles(hp.x, hp.y, 2, `hsl(${rand(180, 300)},80%,70%)`); SFX.sparkle(); }
                        if (Math.random() < 0.1) SFX.giggle();
                    }
                });
            });
        });

        const camera = new Camera(videoEl, {
            onFrame: async () => { await hands.send({ image: videoEl }); },
            width: 320, height: 240
        });
        camera.start();

        handTrackingActive = true;
        handBtn.classList.add('active');
        handBtn.textContent = '✋';
    } catch (err) {
        console.error('Hand tracking init failed:', err);
        handBtn.textContent = '✋';
    }
});

function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

// ===== MUTE BUTTON =====
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
    SFX.unlock();
    const muted = SFX.toggleMute();
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('muted', muted);
});

// ===== MAIN LOOP =====
let lastTime = performance.now();

function frame(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // Build pointer list for pupil tracking
    const allPointers = [...globalPointerList];
    pointers.forEach(p => allPointers.push({ x: p.x, y: p.y }));
    handPoints.forEach(hp => allPointers.push(hp));
    if (allPointers.length === 0) allPointers.push({ x: W / 2, y: -200 }); // default up

    // Update
    chars.forEach(c => c.update(dt, allPointers, chars));
    updateSparkles(dt);

    // Draw
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f4edd9';
    ctx.fillRect(0, 0, W, H);

    // Sort by z-index
    const sorted = [...chars].sort((a, b) => a.zIndex - b.zIndex);
    sorted.forEach(c => c.draw(ctx, allPointers));

    // Draw sparkles on top
    drawSparkles();

    // Draw hand points as visual feedback
    if (handTrackingActive && handPoints.length > 0) {
        ctx.globalAlpha = 0.5;
        handPoints.forEach(hp => {
            ctx.fillStyle = '#ff6b9d';
            ctx.beginPath();
            ctx.arc(hp.x, hp.y, 8, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
